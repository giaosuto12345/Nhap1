
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Teleprompter V31 - Masterpiece</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg-color: #000000;
            --tai-color: #0ea5e9; 
            --sinh-color: #10b981; 
            --both-color: #f59e0b; 
            --accent: #ff0055;
            --focus-pos: 35%; 
        }

        body {
            background-color: var(--bg-color); color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0; padding: 0; height: 100vh; overflow: hidden;
            user-select: none; -webkit-tap-highlight-color: transparent;
            display: flex; flex-direction: column;
        }

        /* ==================== UI BAO PHỦ PHÍA TRÊN ==================== */
        #top-ui-wrapper {
            position: absolute; top: 0; left: 0; w-full; width: 100%;
            z-index: 50; padding-top: max(env(safe-area-inset-top), 10px);
            background: linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.7) 60%, transparent 100%);
            pointer-events: none; /* Xuyên click xuống dưới, chỉ bắt click ở các nút */
        }
        #top-ui-wrapper > * { pointer-events: auto; }

        /* HÀNG 1: HEADER TINH GỌN (CHỐNG CHỒNG CHÉO) */
        #app-header {
            display: flex; justify-content: space-between; align-items: flex-start;
            padding: 0 15px; position: relative;
        }

        .hud-box {
            background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px; padding: 6px 10px; display: flex; flex-direction: column;
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        }

        /* Vùng Tên ở giữa được Fix cứng bằng Absolute để luôn nằm giữa màn hình */
        .header-center {
            position: absolute; left: 50%; transform: translateX(-50%); top: 0;
        }
        .speaker-badge {
            display: flex; align-items: center; gap: 8px;
            background: rgba(255,255,255,0.08); padding: 8px 16px; border-radius: 24px;
            font-size: 14px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px;
            transition: all 0.3s; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 0 20px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); white-space: nowrap;
        }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
        .dot.pulse { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(currentColor, 0.8); } 70% { box-shadow: 0 0 0 8px rgba(currentColor, 0); } 100% { box-shadow: 0 0 0 0 rgba(currentColor, 0); } }

        /* Nút Cài đặt */
        .btn-icon {
            width: 42px; height: 42px; border-radius: 12px; display: flex; align-items: center; justify-content: center;
            transition: all 0.2s; background: var(--tai-color); color: white; box-shadow: 0 0 15px rgba(14,165,233,0.3);
        }
        .btn-icon:active { transform: scale(0.95); filter: brightness(1.2); }

        /* HÀNG 2: NÚT MỤC LỤC ĐỘC LẬP DÒNG DƯỚI */
        #sub-header {
            display: flex; justify-content: center; margin-top: 15px; transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .btn-pill {
            background: rgba(30, 41, 59, 0.85); border: 1px solid rgba(255,255,255,0.1); color: white;
            padding: 8px 20px; border-radius: 30px; font-size: 13px; font-weight: bold;
            display: flex; align-items: center; gap: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); transition: transform 0.2s;
        }
        .btn-pill:active { transform: scale(0.95); background: rgba(51, 65, 85, 0.9); }

        /* TRẠNG THÁI KHI CHẠY (PLAYING) - ẨN HÀNG 2, HIỆN NEXT SPEAKER */
        #right-hud-next { display: none; align-items: flex-end; }
        body.is-playing #right-hud-next { display: flex; }
        body.is-playing #btn-settings { display: none; }
        body.is-playing #sub-header { opacity: 0; transform: translateY(-20px); pointer-events: none; }

        /* ==================== KHU VỰC CHÍNH ==================== */
        #prompter-main {
            flex: 1; position: relative; overflow: hidden; height: 100%;
            -webkit-mask-image: linear-gradient(to bottom, transparent 0%, rgba(0,0,0,0.1) 15%, rgba(0,0,0,0.4) 25%, black 35%, black 45%, rgba(0,0,0,0.4) 65%, rgba(0,0,0,0.1) 85%, transparent 100%);
            mask-image: linear-gradient(to bottom, transparent 0%, rgba(0,0,0,0.1) 15%, rgba(0,0,0,0.4) 25%, black 35%, black 45%, rgba(0,0,0,0.4) 65%, rgba(0,0,0,0.1) 85%, transparent 100%);
            transition: filter 0.3s;
        }
        /* Mờ nền khi mở Mục lục hoặc Cài đặt */
        body.modal-open #prompter-main { filter: blur(5px) brightness(0.4); pointer-events: none; }

        #scroll-container {
            position: absolute; inset: 0; overflow-y: auto; -webkit-overflow-scrolling: touch; scroll-behavior: smooth;
            padding-bottom: env(safe-area-inset-bottom);
        }
        #scroll-container::-webkit-scrollbar { display: none; }
        body.is-playing #scroll-container { overflow-y: hidden; scroll-behavior: auto; }

        #text-content {
            width: 90%; margin: 0 auto; padding-top: 65vh; padding-bottom: 65vh;
            white-space: pre-line; line-height: 1.4; font-weight: 800;
            transition: width 0.3s, font-size 0.3s; text-align: center; 
        }

        /* ĐỊNH DẠNG KHỐI CHỮ */
        .script-block { 
            margin-bottom: 24px; transition: all 0.4s ease; padding: 10px; border-radius: 12px; border: 1px solid transparent;
            position: relative; cursor: pointer;
        }
        
        .spk-tai { color: var(--tai-color); }
        .spk-sinh { color: var(--sinh-color); }
        .spk-both { color: var(--both-color); text-transform: uppercase; }

        .script-block.anchor-highlight { background: linear-gradient(90deg, transparent, rgba(255,255,255,0.06), transparent); }

        /* FOCUS MODE */
        body.focus-mode-on .script-block { opacity: 0.25; filter: blur(1px); transform: scale(0.95); pointer-events: none; }
        body.focus-mode-on .script-block.anchor-highlight { opacity: 1; filter: blur(0); transform: scale(1.02); pointer-events: auto; }

        /* THẺ THỜI GIAN CỤC BỘ */
        .block-meta {
            display: flex; justify-content: center; margin-top: 8px; opacity: 0; transition: opacity 0.3s; user-select: none;
        }
        .script-block.show-time .block-meta { opacity: 1; }
        .block-time-badge {
            background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2); border-radius: 20px;
            padding: 2px 10px; font-size: 11px; font-family: monospace; font-weight: bold; color: #fff;
        }

        /* ĐIỂM DỪNG */
        .pause-marker {
            text-align: center; color: rgba(255,255,255,0.1);
            font-size: 0.5em; letter-spacing: 0.2em; font-weight: 400; 
            margin: 10px 0; user-select: none; text-shadow: none; transition: all 0.3s;
        }
        .pause-marker.active-pause { color: #eab308; text-shadow: 0 0 15px #eab308; transform: scale(1.5); }

        /* LOGIC VAI DIỄN */
        body[data-role="tai"][data-opp="blur"] .spk-sinh { opacity: 0.15; filter: blur(2px) grayscale(100%); }
        body[data-role="tai"][data-opp="skip"] .spk-sinh { display: none; }
        body[data-role="tai"] .spk-tai { text-shadow: 0 0 15px rgba(14,165,233,0.3); }

        body[data-role="sinh"][data-opp="blur"] .spk-tai { opacity: 0.15; filter: blur(2px) grayscale(100%); }
        body[data-role="sinh"][data-opp="skip"] .spk-tai { display: none; }
        body[data-role="sinh"] .spk-sinh { text-shadow: 0 0 15px rgba(16,185,129,0.3); }

        /* VẠCH FOCUS CAMERA Ở 35% */
        .focus-line {
            position: absolute; top: var(--focus-pos); left: 0; width: 100%; height: 130px;
            transform: translateY(-50%); pointer-events: none; z-index: 10;
            border-top: 1px solid rgba(255,255,255,0.1); border-bottom: 1px solid rgba(255,255,255,0.1);
            background: linear-gradient(90deg, rgba(255,255,255,0.02) 0%, transparent 15%, transparent 85%, rgba(255,255,255,0.02) 100%);
            transition: border-color 0.4s, background 0.4s;
        }
        .focus-arrow { 
            position: absolute; top: 50%; transform: translateY(-50%); 
            border-top: 10px solid transparent; border-bottom: 10px solid transparent; transition: border-color 0.4s;
        }
        .focus-arrow.left { left: 0; border-left: 14px solid rgba(255,255,255,0.3); }
        .focus-arrow.right { right: 0; border-right: 14px solid rgba(255,255,255,0.3); }

        #pause-progress-bar {
            position: absolute; bottom: -1px; left: 0; height: 3px;
            background: #eab308; width: 0%; box-shadow: 0 0 10px #eab308; opacity: 0;
        }

        /* ==================== MỤC LỤC BÊN PHẢI ==================== */
        #sidebar-toc {
            position: absolute; top: 0; right: 0; bottom: 0; width: 85%; max-width: 380px;
            background: rgba(15, 15, 15, 0.95); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border-left: 1px solid rgba(255,255,255,0.1); box-shadow: -20px 0 50px rgba(0,0,0,0.8);
            z-index: 100; display: flex; flex-direction: column;
            transform: translateX(100%); transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        }
        body.toc-open #sidebar-toc { transform: translateX(0); }

        .toc-header {
            padding: calc(env(safe-area-inset-top) + 20px) 20px 15px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            display: flex; justify-content: space-between; align-items: center;
        }

        .toc-list { flex: 1; overflow-y: auto; padding: 15px; -webkit-overflow-scrolling: touch; }

        .toc-item {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05);
            border-radius: 12px; padding: 14px; margin-bottom: 10px;
            display: flex; flex-direction: column; gap: 8px;
            cursor: pointer; transition: all 0.2s;
        }
        .toc-item:active { background: rgba(255,255,255,0.1); transform: scale(0.98); }

        .toc-item-top { display: flex; justify-content: space-between; align-items: center; }
        .toc-item-speaker { font-size: 11px; font-weight: 800; text-transform: uppercase; padding: 4px 10px; border-radius: 8px; }
        .toc-item-time { font-family: monospace; font-size: 11px; color: #888; background: rgba(0,0,0,0.3); padding: 2px 6px; border-radius: 4px;}
        .toc-item-text { font-size: 14px; color: #e2e8f0; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        .spk-color-tai { background: rgba(14,165,233,0.15); color: #38bdf8; border: 1px solid rgba(14,165,233,0.3); }
        .spk-color-sinh { background: rgba(16,185,129,0.15); color: #34d399; border: 1px solid rgba(16,185,129,0.3); }
        .spk-color-both { background: rgba(245,158,11,0.15); color: #fbbf24; border: 1px solid rgba(245,158,11,0.3); }

        /* ==================== BOTTOM DOCK ==================== */
        #bottom-dock-wrapper {
            position: absolute; bottom: 0; left: 0; width: 100%;
            padding-bottom: max(env(safe-area-inset-bottom), 15px);
            display: flex; justify-content: center; z-index: 50;
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.3s;
        }
        body.is-playing #bottom-dock-wrapper, body.modal-open #bottom-dock-wrapper { transform: translateY(120%); opacity: 0; pointer-events: none; }

        .glass-dock {
            background: rgba(15, 15, 15, 0.95); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255,255,255,0.08); border-radius: 32px; box-shadow: 0 20px 40px rgba(0,0,0,0.8);
            width: 95%; max-width: 400px; padding: 16px; display: flex; flex-direction: column; gap: 16px;
        }

        .stepper-btn {
            background: rgba(255,255,255,0.1); color: white; font-weight: bold; font-size: 18px;
            width: 34px; height: 34px; display: flex; align-items: center; justify-content: center;
            border-radius: 10px; transition: background 0.2s;
        }
        .stepper-btn:active { background: rgba(255,255,255,0.3); transform: scale(0.95); }
        .stepper-val { font-size: 14px; font-weight: 800; font-family: monospace; width: 36px; text-align: center; color: var(--accent); }

        .mirrored { transform: scaleX(-1); }

    </style>
</head>
<body data-role="all" data-opp="skip" class="focus-mode-off">

    <!-- KHU VỰC CHỨA UI CỐ ĐỊNH TRÊN CÙNG -->
    <div id="top-ui-wrapper">
        <!-- HÀNG 1: HEADER THÔNG SỐ -->
        <header id="app-header">
            <!-- Trái: Tiến độ -->
            <div class="hud-box" style="min-width: 90px;">
                <span class="text-[8px] text-gray-500 font-bold uppercase tracking-widest mb-0.5">Tiến độ</span>
                <div class="flex items-baseline gap-1">
                    <span id="time-elapsed" class="font-mono font-bold text-[12px] text-white">00:00</span>
                    <span id="time-total" class="font-mono text-[9px] text-gray-500">/00:00</span>
                </div>
            </div>

            <!-- Giữa: Vai đọc (Cố định tuyệt đối) -->
            <div class="header-center">
                <div id="speaker-badge" class="speaker-badge text-gray-400">
                    <div class="dot" id="speaker-dot"></div>
                    <span id="speaker-name">CHUẨN BỊ</span>
                </div>
            </div>

            <!-- Phải: Cài đặt hoặc Lượt tiếp theo -->
            <div style="min-width: 90px; display: flex; justify-content: flex-end;">
                <!-- Hiện khi Pause -->
                <button id="btn-settings" onclick="toggleSettings(event)" class="btn-icon">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                </button>
                <!-- Hiện khi Play -->
                <div id="right-hud-next" class="hud-box">
                    <span class="text-[8px] text-gray-500 font-bold uppercase tracking-widest mb-0.5 w-full text-right">Lượt kế >></span>
                    <span id="next-speaker-name" class="font-bold text-[12px] text-gray-300 text-right w-full">---</span>
                </div>
            </div>
        </header>

        <!-- HÀNG 2: MỤC LỤC KỊCH BẢN NẰM HẲN DÒNG DƯỚI -->
        <div id="sub-header">
            <button onclick="toggleTOC(event)" class="btn-pill relative">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h7"></path></svg>
                MỤC LỤC PHÂN CẢNH
                <span class="absolute -top-1 -right-1 w-3 h-3 bg-red-500 rounded-full border-2 border-slate-800"></span>
            </button>
        </div>
        
        <!-- Thanh gạch mảnh chạy % -->
        <div id="progress-bar" style="bottom: auto; top: 100%; margin-top: 15px;"></div>
    </div>

    <!-- MÀN HÌNH CHÍNH CHỨA CHỮ -->
    <main id="prompter-main">
        <div class="focus-line" id="focus-bracket">
            <div class="focus-arrow left" id="focus-arrow-l"></div>
            <div class="focus-arrow right" id="focus-arrow-r"></div>
            <div id="pause-progress-bar"></div>
        </div>
        <div id="scroll-container">
            <div id="text-content"></div>
        </div>
    </main>

    <!-- SIDEBAR MỤC LỤC TỪ TRÁI SANG -->
    <div id="sidebar-toc">
        <div class="toc-header">
            <div>
                <h3 class="font-bold text-xl text-white">Mục Lục</h3>
                <p class="text-[10px] text-gray-400 uppercase mt-1 tracking-wider">Chạm để nhảy đến phân cảnh</p>
            </div>
            <button onclick="toggleTOC(event)" class="w-9 h-9 bg-white/10 rounded-full flex items-center justify-center text-gray-400 hover:text-white">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
        </div>
        <div class="toc-list" id="toc-list-container"></div>
    </div>

    <!-- BOTTOM DOCK -->
    <footer id="bottom-dock-wrapper">
        <div class="glass-dock">
            <div class="flex justify-between gap-3">
                <div class="flex-1 bg-black/50 rounded-2xl p-2 border border-white/5 flex flex-col items-center">
                    <span class="text-[8px] text-gray-500 font-bold uppercase mb-1 tracking-wider">Tốc độ</span>
                    <div class="flex items-center w-full justify-between px-1">
                        <button onclick="adj('speed', -0.2, event)" class="stepper-btn">−</button>
                        <span id="ui-val-speed" class="stepper-val">4.5</span>
                        <button onclick="adj('speed', 0.2, event)" class="stepper-btn">+</button>
                    </div>
                </div>
                
                <div class="flex-1 bg-black/50 rounded-2xl p-2 border border-white/5 flex flex-col items-center">
                    <span class="text-[8px] text-gray-500 font-bold uppercase mb-1 tracking-wider">Cỡ chữ</span>
                    <div class="flex items-center w-full justify-between px-1">
                        <button onclick="adj('fontSize', -2, event)" class="stepper-btn">−</button>
                        <span id="ui-val-font" class="stepper-val">90</span>
                        <button onclick="adj('fontSize', 2, event)" class="stepper-btn">+</button>
                    </div>
                </div>
            </div>

            <div class="flex items-center justify-between px-2 mt-1">
                <button onclick="resetPrompter(event)" class="w-12 h-12 rounded-full bg-white/10 flex items-center justify-center text-gray-300 active:scale-95 transition">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                </button>

                <button onclick="togglePlay(event)" class="w-[64px] h-[64px] rounded-full bg-[var(--accent)] text-white flex items-center justify-center shadow-[0_0_20px_rgba(255,0,85,0.4)] active:scale-95 transition transform">
                    <svg id="icon-play" class="w-8 h-8 ml-1" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd"></path></svg>
                </button>

                <button onclick="toggleMirror(event)" id="btn-mirror" class="w-12 h-12 rounded-full bg-white/10 flex items-center justify-center text-gray-300 active:scale-95 transition">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"></path></svg>
                </button>
            </div>
        </div>
    </footer>

    <!-- MODAL CÀI ĐẶT STUDIO -->
    <div id="modal-settings" class="fixed inset-0 bg-black/85 z-[60] hidden flex-col justify-end transition-opacity opacity-0 backdrop-blur-sm" onclick="if(event.target===this) toggleSettings(event)">
        <div class="bg-[#111] w-full max-w-md mx-auto rounded-t-[32px] p-6 pb-[max(env(safe-area-inset-bottom),20px)] border-t border-gray-800 max-h-[85vh] flex flex-col">
            <div class="flex justify-between items-center mb-4 flex-shrink-0">
                <h3 class="font-bold text-xl text-white">Cài đặt Studio</h3>
                <button onclick="toggleSettings(event)" class="w-8 h-8 bg-white/10 rounded-full flex items-center justify-center text-gray-400 hover:text-white"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
            </div>

            <div class="space-y-6 overflow-y-auto pb-4 pr-1 flex-1">
                <button onclick="toggleSettings(event); setTimeout(toggleEditor, 300)" class="w-full bg-sky-600/20 border border-sky-500/30 text-sky-400 py-3 rounded-xl font-bold flex items-center justify-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                    Sửa nội dung Kịch bản
                </button>

                <!-- FOCUS MODE -->
                <div class="bg-indigo-500/10 rounded-2xl p-4 border border-indigo-500/30 flex items-center justify-between">
                    <div>
                        <span class="text-[12px] font-bold text-indigo-400 block mb-0.5">Đọc Tập Trung (Focus Mode)</span>

    <script>
        const defaultScript = `Tài: Kính thưa thủ trưởng!

Đến với chương trình Tuyên truyền viên trẻ năm 2026 của Kho KV1, cho phép Đội thi Chi đoàn Khối CMKT xin được gửi tới thủ trưởng, các vị đại biểu cùng toàn thể các đồng chí lời kính chúc sức khỏe và lời chào trân trọng nhất. Chúc Hội thi Cán bộ đoàn giỏi và Tuyên truyền viên trẻ ngày hôm nay…

Cả 2 TTV: … thành công tốt đẹp! 

Tài: Đội thi Chúng tôi xin được tự giới thiệu: 
Tôi: Thượng úy Đỗ Văn Tài, Bí thư Chi đoàn Khối CMKT

Tài: Sau đây, phần thi của Chi đoàn Khối CMKT xin phép được bắt đầu!

Sinh: Kính thưa thủ trưởng!
Kính thưa ban giám khảo!
Thưa toàn thể các đồng chí!
Đại hội đại biểu Đoàn TNCS Hồ Chí Minh Quân đội lần thứ XI là một sự kiện chính trị quan trọng, có ý nghĩa sâu sắc đối với tuổi trẻ trong Quân đội nhân dân Việt Nam. 

Đại hội là dịp để chúng ta nhìn lại chặng đường đã qua, đánh giá những kết quả đạt được, thẳng thắn chỉ ra những hạn chế, đồng thời xác định phương hướng, mục tiêu, nhiệm vụ cho nhiệm kỳ mới. Đây cũng là đợt sinh hoạt chính trị sâu rộng nhằm nâng cao nhận thức, trách nhiệm và khơi dậy niềm tự hào, ý chí phấn đấu trong mỗi cán bộ, đoàn viên, Thanh niên toàn quân.

Tài: Kính thưa các đồng chí!
Trong nhiệm kỳ 2022-2025, dưới sự lãnh đạo của Đảng, Quân ủy Trung ương và sự chỉ đạo trực tiếp của Tổng cục Chính trị, công tác Đoàn và phong trào Thanh niên trong quân đội đã có bước phát triển toàn diện. Tuổi trẻ quân đội luôn giữ vững bản lĩnh chính trị, tuyệt đối trung thành với Đảng, Tổ quốc và Nhân dân; sẵn sàng nhận và hoàn thành tốt mọi nhiệm vụ được giao.

Thanh niên Quân đội đã phát huy vai trò xung kích trong huấn luyện, sẵn sàng chiến đấu; tích cực tham gia các nhiệm vụ khó khăn, gian khổ, đặc biệt là trong phòng, chống thiên tai, cứu hộ, cứu nạn. Hình ảnh người chiến sĩ trẻ không quản hiểm nguy, ngày đêm bám chốt, hỗ trợ nhân dân đã để lại những dấu ấn tốt đẹp trong lòng nhân dân, góp phần tô thắm phẩm chất cao đẹp “Bộ đội Cụ Hồ”. 

Sinh: Bên cạnh đó, phong trào “Thanh niên Quân đội rèn đức, luyện tài, xung kích, sáng tạo, quyết thắng” được triển khai sâu rộng, mang lại hiệu quả thiết thực. Nhiều mô hình hay, cách làm sáng tạo đã được nhân rộng; nhiều công trình, sáng kiến của đoàn viên, Thanh niên được áp dụng vào thực tiễn, góp phần nâng cao chất lượng huấn luyện, công tác và sẵn sàng chiến đấu.

Công tác giáo dục chính trị, tư tưởng được chú trọng, với nhiều hình thức phong phú, đa dạng, phù hợp với đặc điểm của Thanh niên trong thời đại số. Tổ chức Đoàn các cấp đã không ngừng được củng cố, kiện toàn; chất lượng đoàn viên, cán bộ Đoàn ngày càng được nâng cao.

Tài: Tuy nhiên, bên cạnh những kết quả đạt được, công tác Đoàn và phong trào Thanh niên trong quân đội vẫn còn một số hạn chế như: Nội dung, phương thức hoạt động ở một số nơi còn chậm đổi mới; việc nắm bắt tư tưởng Thanh niên có lúc chưa kịp thời; một bộ phận nhỏ Thanh niên còn thiếu ý thức tự rèn luyện.

Kính thưa các đồng chí!

Tài: Bước vào nhiệm kỳ 2025-2030, tình hình thế giới và khu vực tiếp tục có nhiều diễn biến phức tạp, khó lường; nhiệm vụ xây dựng và bảo vệ Tổ quốc đặt ra yêu cầu ngày càng cao. Điều đó đòi hỏi Thanh niên quân đội phải không ngừng nỗ lực, phấn đấu vươn lên, xứng đáng là lực lượng xung kích, đi đầu.

Đại hội đại biểu Đoàn TNCS Hồ Chí Minh Quân đội lần thứ XI đã xác định rõ mục tiêu: xây dựng lớp Thanh niên quân đội có bản lĩnh chính trị vững vàng, có đạo đức cách mạng trong sáng, có trình độ chuyên môn, kỹ năng quân sự tốt, kỷ luật nghiêm, sẵn sàng nhận và hoàn thành xuất sắc mọi nhiệm vụ.

Để đạt được mục tiêu đó, mỗi đoàn viên, Thanh niên cần tập trung thực hiện tốt một số nhiệm vụ trọng tâm sau:

Thứ nhất, thường xuyên quán triệt sâu sắc Nghị quyết Đại hội XIV của Đảng, các nghị quyết, chỉ thị của Ban Chấp hành Trung ương, Bộ Chính trị, Ban Bí thư, Nghị quyết Đại hội Đảng bộ Quân đội lần thứ XII; nhất là các nghị quyết, chỉ thị về công tác Thanh niên Quân đội trong thời kỳ mới. Bám sát mục tiêu, nhiệm vụ của cách mạng, nhiệm vụ của Quân đội để xây dựng và tổ chức thực hiện thắng lợi các chương trình hoạt động đúng hướng, phù hợp với điều kiện thực tiễn của đơn vị và tâm tư nguyện vọng của cán bộ, ĐVTN; góp phần tích cực vào công tác xây dựng tổ chức Đảng trong sạch, vững mạnh tiêu biểu, xây dựng đơn vị vững mạnh toàn diện, mẫu mực tiêu biểu. Thanh niên Quân đội phải luôn là lực lượng xung kích, đi đầu trong các phong trào thi đua, góp phần thực hiện thắng lợi nhiệm vụ chính trị của các đơn vị và toàn quân.

Sinh: Thứ hai, tăng cường hơn nữa công tác giáo dục chính trị, tư tưởng, nâng cao nhận thức về mục tiêu, lý tưởng cách mạng, bản lĩnh chính trị, lòng yêu nước, yêu chủ nghĩa xã hội, lòng tự hào, tự tôn dân tộc, truyền thống vẻ vang của Đảng, dân tộc, Quân đội và của Đoàn, xây dựng niềm tin và bồi dưỡng kinh nghiệm chiến đấu, có kiến thức tổng hợp và chuyên sâu; năng động, sáng tạo, tự lực, tự rèn, thích ứng nhanh với thực hiện; tu dưỡng phẩm chất đạo đức cách mạng, lối sống có văn hóa, trung thực, lành mạnh, đoàn kết; có ý thức tổ chức kỷ luật cao, góp phần xây dựng người Thanh niên Quân đội thực sự tiêu biểu cho phẩm chất, bản lĩnh, trí tuệ của Thanh niên Việt Nam, đáp ứng yêu cầu xây dựng và bảo vệ Tổ quốc trong thời kỳ mới.

Tài: Thứ ba, tổ chức tốt các phong trào hành động cách mạng, trọng tâm là thực hiện thắng lợi chỉ đạo của đồng chí Bộ trưởng Bộ Quốc phòng về “2 xung kích, 2 sẵn sàng”. Đó là: Xung kích thực hiện thắng lợi nhiệm vụ chính trị của Quân đội; Xung kích thực hiện thắng lợi các phong trào hành động cách mạng của thanh niên. Đồng thời, Sẵn sàng thực hiện nhiệm vụ khó, nhiệm vụ mới; Sẵn sàng đến vùng sâu, vùng xa, biên giới, hải đảo, những nơi khó khăn, gian khổ nhất.

Qua đó, đưa cán bộ, ĐVTN vào rèn luyện trong thực tiễn, góp phần hoàn thành xuất sắc nhiệm vụ chính trị của đơn vị, tạo tiền đề vững chắc phấn đấu năm 2030 xây dựng Quân đội hiện đại. Tiếp tục đẩy mạnh thực hiện Cuộc vận động “Phát huy truyền thống, cống hiến tài năng, xứng danh Bộ đội Cụ Hồ” thời kỳ mới; đi đầu trong học tập, làm chủ khoa học công nghệ và nâng cao chất lượng phong trào “Sáng tạo trẻ”.

Sinh: Thứ tư, tập trung xây dựng tổ chức đoàn vững mạnh về chính trị, tư tưởng, tổ chức và đạo đức; đặt công tác xây dựng Đoàn là một bộ phận quan trọng của công tác xây dựng Đảng là xây dựng Đảng trước một bước; đồng thời quan tâm hơn nữa đến hoạt động của tổ chức đoàn, chăm lo giải quyết những nguyện vọng chính đáng của Thanh niên, tạo điều kiện về thời gian, vật chất và kinh phí cho tổ chức đoàn hoạt động; tăng cường công tác quy hoạch, đào tạo, bồi dưỡng đội ngũ cán bộ đoàn để bổ sung nguồn cán bộ trẻ cho Quân đội. 

Tài: Thứ năm, thường xuyên tranh thủ sự chỉ đạo, hướng dẫn, giúp đỡ về mọi mặt của các cơ quan chức năng trong và ngoài Quân đội, cấp uỷ, chính quyền, tổ chức đoàn và nhân dân các địa phương; nâng cao chất lượng, hiệu quả phối hợp hoạt động với lực lượng Thanh niên trên các địa bàn đóng quân, làm tốt công tác dân vận, xây dựng cơ sở chính trị, củng cố quốc phòng, an ninh, phát triển kinh tế, văn hoá, xã hội, thực hiện tốt chức năng đội quân công tác, góp phần xây dựng mối quan hệ đoàn kết máu thịt “quân dân” và củng cố “thế trận lòng dân” vững chắc.

Sinh: Kính thưa thủ trưởng, thưa toàn thể các đồng chí!
Tổ chức Đoàn các cấp trong quân đội cần tiếp tục đổi mới mạnh mẽ nội dung và phương thức hoạt động; lấy đoàn viên, Thanh niên làm trung tâm; phát huy vai trò chủ thể của Thanh niên trong các phong trào hành động cách mạng. Công tác giáo dục lý tưởng cách mạng, đạo đức, lối sống cần được đặt lên hàng đầu; kết hợp chặt chẽ giữa giáo dục truyền thống với ứng dụng công nghệ hiện đại. Đồng thời, cần quan tâm xây dựng đội ngũ cán bộ Đoàn có đủ phẩm chất, năng lực, uy tín, ngang tầm nhiệm vụ.

Sinh: Bên cạnh đó, cần đẩy mạnh phong trào “3 tiên phong quyết thắng” gắn với thực hiện nhiệm vụ chính trị của từng cơ quan, đơn vị; tạo môi trường thuận lợi để Thanh niên rèn luyện, cống hiến và trưởng thành. Phát huy truyền thống vẻ vang của Quân đội nhân dân Việt Nam anh hùng, mỗi cán bộ, đoàn viên, Thanh niên hôm nay cần nhận thức sâu sắc trách nhiệm của mình; không ngừng học tập, rèn luyện, phấn đấu vươn lên; xứng đáng với niềm tin yêu của Đảng, Nhà nước và Nhân dân.

Hãy để tinh thần “Thanh niên Quân đội - bản lĩnh, tiên phong, đột phá, phát triển, xứng danh Bộ đội Cụ Hồ, tự tự vững bước vào kỷ nguyên mới” của Đại hội trở thành động lực thôi thúc mỗi chúng ta hành động, cống hiện nhiều hơn nữa cho sự nghiệp xây dựng và bảo vệ Tổ quốc.

Tài: Kính thưa thủ trưởng, thưa toàn thể các đồng chí!
Vinh dự, tự hào là người lính Quân khí. Trước yêu cầu của sự nghiệp xây dựng và bảo vệ Tổ quốc trong tình hình mới, đòi hỏi mỗi cán bộ, đoàn viên hôm nay phải đặt ra những yêu cầu ngày càng cao về phẩm chất chính trị, năng lực, phương pháp tác phong công tác. Có kiến thức toàn diện cả về chính trị, quân sự, kinh tế, khoa học kỹ thuật, nghiệp vụ. Mỗi cán bộ, chiến sĩ phải gương mẫu trong lời nói và việc làm, thực hiện theo tinh thần “7 dám” của đồng chí Cố Tổng Bí thư Nguyễn Phú Trọng: “Dám nghĩ, Dám nói, Dám làm, Dám chịu trách nhiệm, Dám đổi mới, sáng tạo, Dám đương đầu với khó khăn, thử thách, Dám hành động vì lợi ích chung”; phải thực sự cần, kiệm, liêm, chính, chí công vô tư; nói đi đôi với làm; kiên quyết chống chủ nghĩa cá nhân; góp phần xây dựng Đoàn cơ sở, xây dựng Kho vững mạnh về chính trị, tư tưởng, đạo đức, tổ chức và cán bộ; hoàn thành xuất sắc mọi nhiệm vụ.

Tài: Cùng với đó, mỗi cán bộ, đoàn viên phải luôn nêu cao tinh thần cảnh giác cách mạng, kiên quyết đấu tranh làm thất bại âm mưu, chiến lược “diễn biến hòa bình”, bạo loạn lật đổ, “phi chính trị hóa” quân đội, thúc đẩy “tự diễn biến”, “tự chuyển hóa” trong nội bộ, xuyên tạc hình ảnh “Bộ đội Cụ Hồ” của các thế lực thù địch. Thường xuyên học tập, trau dồi, nâng cao giác ngộ, tuyệt đối trung thành với Tổ quốc, với Đảng. Mưu trí, dũng cảm, luôn đi đầu trong thực hiện nhiệm vụ, kiên quyết ngăn chặn mọi biểu hiện suy thoái về tư tưởng chính trị, đạo đức, lối sống, giữ vững bản chất cách mạng của quân đội ta.

Sinh: Cán bộ, đoàn viên Thanh niên Kho KV1 luôn thể hiện lòng tự hào, tự tôn về truyền thống vẻ vang của dân tộc Việt Nam, Đảng Cộng sản Việt Nam, Quân đội nhân dân Việt Nam và Đoàn TNCS Hồ Chí Minh, nguyện phấn đấu xứng danh “Bộ đội Cụ Hồ” thời kỳ mới. Quán triệt và thực hiện tốt tiêu chí học tập và làm theo tư tưởng, đạo đức, phong cách Hồ Chí Minh của Thanh niên Quân đội. Rèn luyện phẩm chất đạo đức, lối sống trong sạch, lành mạnh, khiêm tốn, giản dị; thực hiện cần, kiệm, liêm, chính, chí công vô tư; cởi mở, chân thành, lạc quan, tự tin; nói đi đôi với làm; ứng xử có văn hóa. Tự giác học tập, rèn luyện, nâng cao trình độ nhận thức về chính trị, học vấn, chuyên môn, kỹ thuật, chiến thuật, kiến thức văn hóa, xã hội… đáp ứng yêu cầu chức trách, nhiệm vụ được giao.  

Sinh: Luôn chủ động, sáng tạo thường xuyên trau dồi kỹ năng, làm việc có kế hoạch, khoa học, cụ thể, tỷ mỉ, chu đáo, cẩn trọng, sâu sát thực tiễn; nêu cao tinh thần sáng tạo, ý chí tự lực, tự cường, quyết đoán, dám nghĩ, dám làm, dám chịu trách nhiệm trong mọi công việc. Nêu cao tinh thần xung kích, tình nguyện, sẵn sàng đi bất cứ nơi đâu, làm bất cứ nhiệm vụ gì mà tổ chức phân công. Sẵn sàng nhận và hoàn thành tốt mọi nhiệm vụ được giao; phát huy tinh thần quyết chiến, quyết thắng của Quân đội nhân dân Việt Nam anh hùng.

- Có tinh thần đoàn kết gắn bó mật thiết với Nhân dân, đoàn kết nội bộ và đoàn kết quốc tế; yêu thương và có trách nhiệm với bản thân, gia đình, đồng chí, đồng đội, trách nhiệm với công việc, cộng đồng và xã hội. Thực hành dân chủ, kỷ luật tự giác, nghiêm minh. Chấp hành nghiêm chủ trương, đường lối của Đảng, chính sách và pháp luật của Nhà nước, kỷ luật Quân đội và các quy định của cơ quan, đơn vị.

Tài: Tích cực tham gia công tác xây dựng đoàn; nghiên cứu, nắm vững những kiến thức, hiểu biết về Đoàn; thực sự là nòng cốt trong thực hiện các phong trào thi đua quyết thắng, các cuộc vận động và hoạt động tại đơn vị; luôn xung kích đi đầu trong nhiệm vụ huấn luyện, sẵn sàng chiến đấu, nghiên cứu khoa học, lao động, sản xuất kinh doanh... chấp hành nghiêm nghị quyết của chi bộ, đảng bộ đơn vị và chỉ thị, mệnh lệnh của cấp trên; chấp hành nghiêm Điều lệ Đoàn, các nghị quyết của Đoàn, thực hiện tốt cuộc vận động “Đoàn viên phấn đấu trở thành đảng viên Đảng Cộng sản Việt Nam”.

Tài: Phát huy truyền thống anh hùng của Quân đội nhân dân Việt Nam và truyền thống vẻ vang của Đoàn Thanh niên Cộng sản Hồ Chí Minh; xứng đáng là bộ phận ưu tú của Thanh niên cả nước, tiêu biểu cho hình mẫu người Thanh niên Việt Nam trong thời đại Hồ Chí Minh, luôn nêu cao tinh thần: “Trung thành, bản lĩnh - Đổi mới, sáng tạo - Xung kích, dũng cảm - Xứng danh Bộ đội Cụ Hồ thời kỳ mới” ; quyết tâm hoàn thành xuất sắc mọi nhiệm vụ, xứng đáng là lực lượng chính trị, lực lượng chiến đấu trung thành, tin cậy của Đảng, Nhà nước, Quân đội và Nhân dân./.

Sinh: Kính thưa thủ trưởng!
Kính thưa ban giám khảo
Thưa toàn thể các đồng chí!
Phần thi tuyên truyền với chủ đề: “Tuyên truyền thực hiện thắng lợi Nghị quyết Đại hội Đại biểu Đoàn TNCS Hồ Chí Minh Quân đội lần thứ XI” của Chi đoàn Khối CMKT đến đây là kết thúc.

Một lần nữa, xin kính chúc thủ trưởng, ban giám khảo cùng toàn thể các đồng chí sức khỏe, hạnh phúc và phát triển.

Cả 2: Chúc Hội thi thành công tốt đẹp!`;

        const FOCUS_PERCENT = 0.35;

        const state = {
            isPlaying: false, speed: 4.5, fontSize: 90, width: 90, pauseDelay: 1.0,
            align: 'center', role: 'all', oppMode: 'skip', tocMode: 'turn', isFocusMode: false,
            animId: null, lastTime: 0, totalWords: 0, estSeconds: 0,
            currentScrollPos: 0, anchorTimeout: null, wakeLock: null,
            pauseMarkers: [], isAutoPausing: false, tocData: []
        };

        let DOM = {};

        window.onload = () => {
            DOM = {
                container: document.getElementById('scroll-container'),
                content: document.getElementById('text-content'),
                input: document.getElementById('script-input'),
                btnPlay: document.getElementById('icon-play')
            };

            try {
                DOM.input.value = localStorage.getItem('v31_script') || defaultScript;
                const savedSettings = localStorage.getItem('v31_settings');
                if(savedSettings) {
                    const s = JSON.parse(savedSettings);
                    state.speed = s.speed || 4.5; state.fontSize = s.fontSize || 90;
                    state.width = s.width || 90; state.pauseDelay = (s.pauseDelay !== undefined) ? s.pauseDelay : 1.0;
                    state.align = s.align || 'center'; state.role = s.role || 'all'; state.oppMode = s.oppMode || 'skip';
                    state.tocMode = s.tocMode || 'turn'; state.isFocusMode = s.isFocusMode || false;
                }
            } catch(e) { DOM.input.value = defaultScript; }

            applyRoleUI(state.role); applyOppModeUI(state.oppMode); applyTocModeUI(state.tocMode); applyAlignUI(state.align); applyFocusModeUI();
            parseAndRender(); applySettings();
            requestWakeLock();
            setupGlobalPauseListener();
        };

        /* ==================== GLOBAL PAUSE - BÀN TAY SẮT ==================== */
        function setupGlobalPauseListener() {
            // Can thiệp chặn click ngay từ tầng cao nhất của trình duyệt (Dùng Capture phase)
            const preventAndPause = (e) => {
                if (state.isPlaying) {
                    // Nếu bấm trúng cái thanh hiển thị Top thì bỏ qua
                    if (e.target.closest('#app-header') || e.target.closest('#bottom-dock-wrapper')) return;
                    
                    e.preventDefault();
                    e.stopPropagation();
                    togglePlay();
                }
            };
            
            // Xử lý hoàn hảo trên cả điện thoại (touchstart) và máy tính (mousedown)
            window.addEventListener('touchstart', preventAndPause, { capture: true, passive: false });
            window.addEventListener('mousedown', preventAndPause, { capture: true });
        }

        async function requestWakeLock() {
            try { if ('wakeLock' in navigator) state.wakeLock = await navigator.wakeLock.request('screen'); } catch (err) { }
        }
        document.addEventListener('visibilitychange', async () => {
            if (state.wakeLock !== null && document.visibilityState === 'visible') await requestWakeLock();
        });

        function saveSettings() {
            try {
                localStorage.setItem('v31_settings', JSON.stringify({
                    speed: state.speed, fontSize: state.fontSize, width: state.width, pauseDelay: state.pauseDelay,
                    align: state.align, role: state.role, oppMode: state.oppMode, tocMode: state.tocMode, isFocusMode: state.isFocusMode
                }));
            } catch(e) {}
        }

        function adj(key, delta, e) {
            if(e) e.stopPropagation();
            let newVal = state[key] + delta;
            if(key === 'speed') state.speed = Math.max(0.5, Math.min(20.0, Math.round(newVal * 10) / 10));
            else if (key === 'fontSize') state.fontSize = Math.max(30, Math.min(250, Math.round(newVal)));
            else if (key === 'width') state.width = Math.max(30, Math.min(100, Math.round(newVal)));
            else if (key === 'pauseDelay') state.pauseDelay = Math.max(0.0, Math.min(5.0, Math.round(newVal * 10) / 10));
            applySettings();
        }

        function applySettings() {
            document.getElementById('ui-val-speed').innerText = state.speed.toFixed(1);
            document.getElementById('ui-val-font').innerText = state.fontSize;
            document.getElementById('ui-val-width').innerText = state.width + '%';
            document.getElementById('ui-val-delay').innerText = state.pauseDelay.toFixed(1) + 's';

            if(DOM.content) {
                DOM.content.style.fontSize = `${state.fontSize}px`;
                DOM.content.style.width = `${state.width}%`;
                DOM.content.style.textAlign = state.align;
            }
            recalcTime(); updateAllBlockTimes(); renderTOC(); saveSettings();
        }

        function setAlign(alignType, e) {
            if(e) e.stopPropagation(); state.align = alignType; applyAlignUI(alignType); applySettings();
        }

        function applyAlignUI(alignType) {
            ['left', 'center', 'right', 'justify'].forEach(t => {
                const b = document.getElementById(`align-${t}`);
                if(b) {
                    if(t === alignType) { b.classList.replace('bg-black', 'bg-gray-800'); b.classList.replace('border-gray-800', 'border-gray-600'); b.classList.replace('text-gray-500', 'text-white'); }
                    else { b.classList.replace('bg-gray-800', 'bg-black'); b.classList.replace('border-gray-600', 'border-gray-800'); b.classList.replace('text-white', 'text-gray-500'); }
                }
            });
        }

        function setRole(roleCode, tabIndex, e) {
            if(e) e.stopPropagation(); 
            state.role = roleCode; document.body.setAttribute('data-role', roleCode); 
            applyRoleUI(roleCode); updateTotalWords(); updateHUD(); saveSettings();
        }

        function applyRoleUI(roleCode) {
            let tabIndex = roleCode === 'all' ? 0 : (roleCode === 'tai' ? 1 : 2);
            const rbg = document.getElementById('role-bg'); if(rbg) rbg.style.transform = `translateX(${tabIndex * 100}%)`;
            ['all', 'tai', 'sinh'].forEach((r, i) => {
                const b = document.getElementById(`btn-role-${r}`);
                if(b) { b.classList.toggle('text-white', i === tabIndex); b.classList.toggle('text-gray-500', i !== tabIndex); }
            });
        }

        function setOppMode(mode, e) {
            if(e) e.stopPropagation(); state.oppMode = mode; document.body.setAttribute('data-opp', mode); applyOppModeUI(mode); updateHUD(); saveSettings();
        }

        function applyOppModeUI(mode) {
            const bSkip = document.getElementById('opp-skip'); const bBlur = document.getElementById('opp-blur');
            if(!bSkip || !bBlur) return;
            if (mode === 'skip') {
                bSkip.classList.replace('text-gray-500', 'text-white'); bSkip.classList.replace('bg-black', 'bg-gray-800'); bSkip.classList.replace('border-gray-800', 'border-gray-600');
                bBlur.classList.replace('text-white', 'text-gray-500'); bBlur.classList.replace('bg-gray-800', 'bg-black'); bBlur.classList.replace('border-gray-600', 'border-gray-800');
            } else {
                bBlur.classList.replace('text-gray-500', 'text-white'); bBlur.classList.replace('bg-black', 'bg-gray-800'); bBlur.classList.replace('border-gray-800', 'border-gray-600');
                bSkip.classList.replace('text-white', 'text-gray-500'); bSkip.classList.replace('bg-gray-800', 'bg-black'); bSkip.classList.replace('border-gray-600', 'border-gray-800');
            }
        }

        function setTocMode(mode, e) {
            if(e) e.stopPropagation(); state.tocMode = mode; applyTocModeUI(mode); renderTOC(); saveSettings();
        }

        function applyTocModeUI(mode) {
            const bTurn = document.getElementById('toc-turn'); const bDetail = document.getElementById('toc-detail');
            if(!bTurn || !bDetail) return;
            if (mode === 'turn') {
                bTurn.classList.replace('text-gray-500', 'text-white'); bTurn.classList.replace('bg-black', 'bg-gray-800'); bTurn.classList.replace('border-gray-800', 'border-gray-600');
                bDetail.classList.replace('text-white', 'text-gray-500'); bDetail.classList.replace('bg-gray-800', 'bg-black'); bDetail.classList.replace('border-gray-600', 'border-gray-800');
            } else {
                bDetail.classList.replace('text-gray-500', 'text-white'); bDetail.classList.replace('bg-black', 'bg-gray-800'); bDetail.classList.replace('border-gray-800', 'border-gray-600');
                bTurn.classList.replace('text-white', 'text-gray-500'); bTurn.classList.replace('bg-gray-800', 'bg-black'); bTurn.classList.replace('border-gray-600', 'border-gray-800');
            }
        }

        function toggleFocusMode(e) {
            if(e) e.stopPropagation(); state.isFocusMode = !state.isFocusMode; applyFocusModeUI(); saveSettings();
        }

        function applyFocusModeUI() {
            const btn = document.getElementById('btn-focus-toggle');
            if(!btn) return;
            if(state.isFocusMode) {
                document.body.classList.replace('focus-mode-off', 'focus-mode-on');
                if(!document.body.classList.contains('focus-mode-on')) document.body.classList.add('focus-mode-on');
                btn.classList.replace('bg-gray-700', 'bg-indigo-500');
                btn.firstElementChild.style.transform = 'translateX(24px)';
            } else {
                document.body.classList.replace('focus-mode-on', 'focus-mode-off');
                btn.classList.replace('bg-indigo-500', 'bg-gray-700');
                btn.firstElementChild.style.transform = 'translateX(0)';
            }
            updateAnchor(); 
        }

        function parseAndRender() {
            if(!DOM.input || !DOM.content) return;
            const rawLines = DOM.input.value.split('\n');
            let html = ''; let currentSpeaker = 'both'; let emptyLinesCount = 0;
            state.tocData = [];

            for (let i = 0; i < rawLines.length; i++) {
                let line = rawLines[i].trim();
                if (line === '') { emptyLinesCount++; continue; }

                let spk = currentSpeaker;
                if (/^(Tài:|Tôi: Thượng úy Đỗ Văn Tài|Tôi: Đỗ Văn Tài)/i.test(line)) spk = 'tai';
                else if (/^(Sinh:|Tôi: Thượng úy CN Nguyễn Văn Sinh|Tôi: Nguyễn Văn Sinh)/i.test(line)) spk = 'sinh';
                else if (/^(Cả 2:|Cả 2 TTV:|Cả 2:)/i.test(line)) spk = 'both';

                let isNewSpeaker = (spk !== currentSpeaker);
                currentSpeaker = spk; 

                let cleanText = line.replace(/^(Tài:|Sinh:|Cả 2:|Cả 2 TTV:)[ \t]*/i, '').trim();

                if (cleanText) {
                    let wordCount = cleanText.split(/\s+/).length;
                    let markerHtml = '';
                    if (emptyLinesCount > 0 && html !== '') markerHtml = '<div class="pause-marker" data-triggered="false">— ✧ —</div>';

                    let blockId = `block-${Math.random().toString(36).substr(2, 9)}`;
                    
                    html += `<div id="${blockId}" class="script-block spk-${spk}" data-speaker="${spk}" data-words="${wordCount}" onclick="toggleBlockTime('${blockId}', event)">
                                ${markerHtml}
                                ${cleanText}
                                <div class="block-meta"><span class="block-time-badge">00:00</span></div>
                             </div>`;
                             
                    state.tocData.push({
                        id: blockId, speaker: spk, textSnippet: cleanText.substring(0, 40) + '...',
                        words: wordCount, isNewSpeaker: isNewSpeaker || (emptyLinesCount > 2)
                    });

                    emptyLinesCount = 0;
                }
            }
            DOM.content.innerHTML = html;
            state.pauseMarkers = [];
            
            updateTotalWords(); 
            updateAllBlockTimes();
            renderTOC();
        }

        function toggleBlockTime(blockId, e) {
            if (state.isPlaying) return; 
            if(e) e.stopPropagation();
            const block = document.getElementById(blockId);
            if(block) block.classList.toggle('show-time');
        }

        function updateAllBlockTimes() {
            const speedFactor = state.speed / 4.5;
            const blocks = document.querySelectorAll('.script-block');
            blocks.forEach(b => {
                const words = parseInt(b.getAttribute('data-words')) || 0;
                const estSec = (words / 2.16) / speedFactor;
                const badge = b.querySelector('.block-time-badge');
                if(badge) badge.innerText = `⏱ ${formatTime(estSec)}`;
            });
        }

        function updateTotalWords() {
            let count = 0;
            const blocks = document.querySelectorAll('.script-block');
            blocks.forEach(b => {
                const spk = b.getAttribute('data-speaker');
                const w = parseInt(b.getAttribute('data-words')) || 0;
                if (state.role === 'all') count += w; 
                else if (state.role === 'tai') { if (spk === 'tai' || spk === 'both') count += w; } 
                else if (state.role === 'sinh') { if (spk === 'sinh' || spk === 'both') count += w; }
            });
            state.totalWords = count;
            recalcTime();
        }

        function recalcTime() {
            const speedFactor = state.speed / 4.5; 
            state.estSeconds = (state.totalWords / 2.16) / speedFactor;
            const el = document.getElementById('time-total');
            if(el) el.innerText = `/ ${formatTime(state.estSeconds)}`;
            updateHUD(); 
        }

        function formatTime(sec) {
            if (isNaN(sec) || !isFinite(sec)) return "00:00";
            const m = Math.floor(sec / 60); const s = Math.floor(sec % 60);
            return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        /* ==================== MỤC LỤC & ĐIỀU HƯỚNG ==================== */
        function toggleTOC(e) {
            if(e) e.stopPropagation();
            document.body.classList.toggle('toc-open');
            document.body.classList.toggle('modal-open');
        }

        function renderTOC() {
            const container = document.getElementById('toc-list-container');
            if(!container) return;
            
            let html = '';
            const speedFactor = state.speed / 4.5;

            if (state.tocMode === 'detail') {
                state.tocData.forEach(item => {
                    let estSec = (item.words / 2.16) / speedFactor;
                    html += buildTocItemHtml(item.id, item.speaker, formatTime(estSec), item.textSnippet);
                });
            } else {
                let currentTurn = null;
                state.tocData.forEach((item, index) => {
                    if (!currentTurn || item.speaker !== currentTurn.speaker || item.isNewSpeaker) {
                        if (currentTurn) {
                            let estSec = (currentTurn.words / 2.16) / speedFactor;
                            html += buildTocItemHtml(currentTurn.id, currentTurn.speaker, formatTime(estSec), currentTurn.textSnippet);
                        }
                        currentTurn = { id: item.id, speaker: item.speaker, textSnippet: item.textSnippet, words: item.words };
                    } else {
                        currentTurn.words += item.words;
                    }
                    if (index === state.tocData.length - 1 && currentTurn) {
                        let estSec = (currentTurn.words / 2.16) / speedFactor;
                        html += buildTocItemHtml(currentTurn.id, currentTurn.speaker, formatTime(estSec), currentTurn.textSnippet);
                    }
                });
            }
            container.innerHTML = html;
        }

        function buildTocItemHtml(blockId, speaker, timeStr, text) {
            let spkColorClass = speaker === 'tai' ? 'spk-color-tai' : (speaker === 'sinh' ? 'spk-color-sinh' : 'spk-color-both');
            let spkName = speaker === 'tai' ? 'Đ.c Tài' : (speaker === 'sinh' ? 'Đ.c Sinh' : 'Cả 2');
            
            return `
            <div class="toc-item" onclick="jumpToBlock('${blockId}', event)">
                <div class="toc-item-top">
                    <span class="toc-item-speaker ${spkColorClass}">${spkName}</span>
                    <span class="toc-item-time">⏱ ${timeStr}</span>
                </div>
                <div class="toc-item-text">${text}</div>
            </div>`;
        }

        function jumpToBlock(blockId, e) {
            if(e) e.stopPropagation();
            const block = document.getElementById(blockId);
            if(!block || !DOM.container) return;

            document.body.classList.remove('toc-open', 'modal-open');

            const offset = (window.innerHeight * FOCUS_PERCENT) - 20;
            DOM.container.scrollTo({ top: block.offsetTop - offset, behavior: 'smooth' });

            const marker = block.querySelector('.pause-marker');
            if (marker) marker.setAttribute('data-triggered', 'false');
            
            block.style.boxShadow = '0 0 50px rgba(255,255,255,0.2)';
            block.style.transform = 'scale(1.05)';
            setTimeout(() => {
                block.style.boxShadow = '';
                block.style.transform = '';
            }, 800);
        }

        /* ==================== PLAY & CUỘN ==================== */
        function togglePlay(e) {
            if(e) e.stopPropagation();
            if(!DOM.btnPlay || !DOM.container) return;
            if(document.body.classList.contains('modal-open')) return;

            state.isPlaying = !state.isPlaying;
            const pBar = document.getElementById('pause-progress-bar');

            if (state.isPlaying) {
                document.body.classList.add('is-playing');
                DOM.btnPlay.innerHTML = `<path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zM7 8a1 1 0 012 0v4a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v4a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd"></path>`;
                
                state.pauseMarkers = Array.from(document.querySelectorAll('.pause-marker'));
                state.currentScrollPos = DOM.container.scrollTop;
                state.lastTime = performance.now();
                state.isAutoPausing = false;
                
                if(pBar) { pBar.style.transition = 'none'; pBar.style.opacity = '0'; pBar.style.width = '0%'; }
                
                clearAnchor(); 
                state.animId = requestAnimationFrame(scrollLoop);
            } else {
                document.body.classList.remove('is-playing');
                DOM.btnPlay.innerHTML = `<path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd"></path>`;
                
                cancelAnimationFrame(state.animId);
                updateAnchor(); updateFocusColor(null);
                
                const dot = document.getElementById('speaker-dot');
                if(dot) dot.classList.remove('pausing');
                if(pBar) { pBar.style.transition = 'none'; pBar.style.opacity = '0'; pBar.style.width = '0%'; }
            }
        }

        function scrollLoop(timestamp) {
            if (!state.isPlaying || !DOM.container) return;
            if (!timestamp) timestamp = performance.now();
            
            const containerRect = DOM.container.getBoundingClientRect();
            const cameraY = containerRect.top + (containerRect.height * FOCUS_PERCENT); 

            if (state.pauseDelay > 0 && !state.isAutoPausing && state.pauseMarkers.length > 0) {
                for (let i = 0; i < state.pauseMarkers.length; i++) {
                    let marker = state.pauseMarkers[i];
                    if (marker.getAttribute('data-triggered') !== 'true') {
                        let rect = marker.getBoundingClientRect();
                        let markerY = rect.top + (rect.height / 2);
                        
                        if (markerY <= cameraY) {
                            marker.setAttribute('data-triggered', 'true');
                            state.isAutoPausing = true;
                            marker.classList.add('active-pause'); 
                            
                            const dot = document.getElementById('speaker-dot');
                            if(dot) dot.classList.add('pausing'); 

                            const pBar = document.getElementById('pause-progress-bar');
                            if(pBar) {
                                pBar.style.transition = 'none'; pBar.style.width = '100%'; pBar.style.opacity = '1';
                                void pBar.offsetWidth; 
                                pBar.style.transition = `width ${state.pauseDelay}s linear`;
                                pBar.style.width = '0%';
                            }
                            
                            setTimeout(() => {
                                state.isAutoPausing = false;
                                marker.classList.remove('active-pause');
                                if(dot) dot.classList.remove('pausing');
                                if(pBar) pBar.style.opacity = '0';
                            }, state.pauseDelay * 1000);
                            break; 
                        }
                    }
                }
            }

            if (state.isAutoPausing) {
                state.lastTime = timestamp; 
            } else {
                const delta = timestamp - state.lastTime;
                state.lastTime = timestamp;
                state.currentScrollPos += (state.speed * 0.4) * (delta / 16.67);
                DOM.container.scrollTop = state.currentScrollPos;
                updateHUD();

                if (DOM.container.scrollTop >= DOM.container.scrollHeight - DOM.container.clientHeight - 5) { togglePlay(); return; }
            }
            state.animId = requestAnimationFrame(scrollLoop);
        }

        document.addEventListener('DOMContentLoaded', () => {
            const scContainer = document.getElementById('scroll-container');
            if(scContainer) {
                scContainer.addEventListener('scroll', () => {
                    if(!state.isPlaying) { 
                        state.currentScrollPos = scContainer.scrollTop; 
                        updateHUD(); 
                        const containerRect = scContainer.getBoundingClientRect();
                        const cameraY = containerRect.top + (containerRect.height * FOCUS_PERCENT);
                        state.pauseMarkers = Array.from(document.querySelectorAll('.pause-marker'));
                        state.pauseMarkers.forEach(m => {
                            let rect = m.getBoundingClientRect();
                            let markerY = rect.top + (rect.height / 2);
                            if (markerY > cameraY + 10) m.setAttribute('data-triggered', 'false');
                            else m.setAttribute('data-triggered', 'true');
                        });
                        clearTimeout(state.anchorTimeout);
                        state.anchorTimeout = setTimeout(updateAnchor, 150);
                    }
                });
            }
        });

        /* ==================== CẬP NHẬT UI & FOCUS ==================== */
        function clearAnchor() { document.querySelectorAll('.script-block').forEach(b => b.classList.remove('anchor-highlight')); }

        function updateAnchor() {
            clearAnchor(); if(!DOM.container) return;
            const cameraY = DOM.container.scrollTop + (window.innerHeight * FOCUS_PERCENT);
            const blocks = document.querySelectorAll('.script-block');
            for (let i = 0; i < blocks.length; i++) {
                if (blocks[i].offsetParent === null) continue; 
                const top = blocks[i].offsetTop; const bottom = top + blocks[i].offsetHeight;
                if (cameraY >= top - 40 && cameraY <= bottom + 40) { blocks[i].classList.add('anchor-highlight'); break; }
            }
        }

        function updateFocusColor(speakerCode) {
            const bracket = document.getElementById('focus-bracket');
            const arrL = document.getElementById('focus-arrow-l');
            const arrR = document.getElementById('focus-arrow-r');
            if (!bracket || !arrL || !arrR) return;

            if (!state.isPlaying || !speakerCode) {
                bracket.style.borderColor = 'rgba(255,255,255,0.1)';
                bracket.style.background = 'linear-gradient(90deg, rgba(255,255,255,0.02) 0%, transparent 15%, transparent 85%, rgba(255,255,255,0.02) 100%)';
                arrL.style.borderLeftColor = 'rgba(255,255,255,0.3)'; arrR.style.borderRightColor = 'rgba(255,255,255,0.3)';
                return;
            }

            let colorStr, bgStr;
            if (speakerCode === 'tai') { colorStr = 'rgba(14,165,233,0.5)'; bgStr = 'rgba(14,165,233,0.05)'; }
            else if (speakerCode === 'sinh') { colorStr = 'rgba(16,185,129,0.5)'; bgStr = 'rgba(16,185,129,0.05)'; }
            else { colorStr = 'rgba(245,158,11,0.5)'; bgStr = 'rgba(245,158,11,0.05)'; }

            bracket.style.borderColor = colorStr;
            bracket.style.background = `linear-gradient(90deg, ${bgStr} 0%, transparent 15%, transparent 85%, ${bgStr} 100%)`;
            arrL.style.borderLeftColor = colorStr.replace('0.5', '1'); arrR.style.borderRightColor = colorStr.replace('0.5', '1');
        }

        function updateHUD() {
            if(!DOM.container) return;
            const maxScroll = Math.max(1, DOM.container.scrollHeight - DOM.container.clientHeight);
            const progress = Math.min(1, DOM.container.scrollTop / maxScroll);
            
            const timeEl = document.getElementById('time-elapsed'); const progBar = document.getElementById('progress-bar');
            if(timeEl) timeEl.innerText = formatTime(state.estSeconds * progress);
            if(progBar) progBar.style.width = `${progress * 100}%`;

            const cameraY = DOM.container.scrollTop + (window.innerHeight * FOCUS_PERCENT);
            const blocks = document.querySelectorAll('.script-block');
            
            let activeSpeaker = null; let activeIndex = -1; let nextSpeaker = null;

            for (let i = 0; i < blocks.length; i++) {
                if (blocks[i].offsetParent === null) continue; 
                const top = blocks[i].offsetTop; const bottom = top + blocks[i].offsetHeight;
                if (cameraY >= top - 20 && cameraY <= bottom + 20) {
                    activeSpeaker = blocks[i].getAttribute('data-speaker'); activeIndex = i; break;
                }
            }

            if (activeIndex !== -1) {
                for (let i = activeIndex + 1; i < blocks.length; i++) {
                    if (blocks[i].offsetParent === null) continue;
                    let spk = blocks[i].getAttribute('data-speaker');
                    if (spk !== activeSpeaker) { nextSpeaker = spk; break; }
                }
            }

            const badge = document.getElementById('speaker-name');
            const dot = document.getElementById('speaker-dot');
            const badgeContainer = document.getElementById('speaker-badge');
            
            if(badge && badgeContainer) {
                if (activeSpeaker === 'tai') {
                    badge.innerText = "Đ.C TÀI"; badgeContainer.style.color = "var(--tai-color)"; badgeContainer.style.borderColor = "rgba(14,165,233,0.3)";
                } else if (activeSpeaker === 'sinh') {
                    badge.innerText = "Đ.C SINH"; badgeContainer.style.color = "var(--sinh-color)"; badgeContainer.style.borderColor = "rgba(16,185,129,0.3)";
                } else if (activeSpeaker === 'both') {
                    badge.innerText = "CẢ 2 ĐỌC"; badgeContainer.style.color = "var(--both-color)"; badgeContainer.style.borderColor = "rgba(245,158,11,0.3)";
                } else {
                    badge.innerText = "CHUẨN BỊ"; badgeContainer.style.color = "#666"; badgeContainer.style.borderColor = "rgba(255,255,255,0.1)";
                }
                if(state.isPlaying && !state.isAutoPausing) dot.classList.add('pulse'); else dot.classList.remove('pulse');
            }

            const nextNameEl = document.getElementById('next-speaker-name');
            if(nextNameEl) {
                if(nextSpeaker) {
                    let nameStr = nextSpeaker === 'tai' ? 'Đ.C TÀI' : (nextSpeaker === 'sinh' ? 'Đ.C SINH' : 'CẢ 2');
                    nextNameEl.innerText = nameStr;
                } else { nextNameEl.innerText = "HẾT BÀI"; }
            }
            if (state.isPlaying) updateFocusColor(activeSpeaker);
        }

        /* ==================== MODAL & CAI DAT KHAC ==================== */
        function toggleSettings(e) {
            if(e) e.stopPropagation();
            const el = document.getElementById('modal-settings');
            if(el) {
                if(el.classList.contains('hidden')) { el.classList.remove('hidden'); setTimeout(() => el.style.opacity = '1', 10); document.body.classList.add('modal-open'); } 
                else { el.style.opacity = '0'; setTimeout(() => el.classList.add('hidden'), 300); document.body.classList.remove('modal-open'); }
            }
        }

        function toggleEditor(e) {
            if(e) e.stopPropagation();
            const el = document.getElementById('modal-editor');
            if(el) {
                if(el.classList.contains('hidden')) { el.classList.remove('hidden'); setTimeout(() => el.style.opacity = '1', 10); document.body.classList.add('modal-open'); } 
                else { el.style.opacity = '0'; setTimeout(() => el.classList.add('hidden'), 300); document.body.classList.remove('modal-open'); }
            }
        }
        
        function clearScript(e) { if(e) e.stopPropagation(); if(confirm("Xóa toàn bộ kịch bản hiện tại?") && DOM.input) DOM.input.value = ""; }
        
        function saveScript(e) {
            if(e) e.stopPropagation(); 
            if(DOM.input) { try { localStorage.setItem('v31_script', DOM.input.value); } catch(err){} parseAndRender(); toggleEditor(); resetPrompter(); }
        }

        function resetPrompter(e) {
            if(e) e.stopPropagation();
            if (state.isPlaying) togglePlay();
            if(DOM.container) DOM.container.scrollTop = 0; state.currentScrollPos = 0; 
            state.pauseMarkers.forEach(m => m.setAttribute('data-triggered', 'false'));
            updateHUD(); updateAnchor();
        }

        function toggleMirror(e) { if(e) e.stopPropagation(); const main = document.getElementById('prompter-main'); if(main) main.classList.toggle('mirrored'); }

    </script>
</body>
</html>
