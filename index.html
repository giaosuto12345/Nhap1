<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Quản Lý Đạn" />
  <meta name="mobile-web-app-capable" content="yes" />
  
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <title>Quản lý Xuất Đạn Dược</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <style>
    /* ================== BIẾN MÀU SẮC ================== */
    :root {
      --bg-body: #F2F2F7;
      --bg-card: #FFFFFF;
      --text-main: #1C1C1E;
      --text-sub: #8E8E93;
      --border-light: #E5E5EA;
      --input-bg: #F9F9F9;
      --card-shadow: 0 4px 12px rgba(0,0,0,0.06);
      --primary-color: #007AFF;
      --success-color: #34C759;
      --warning-color: #FF9500;
      --danger-color: #FF3B30;
      --nav-bg: rgba(255, 255, 255, 0.9);
      --header-bg: #ffffff;
      --info-color: #5856D6; 
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-body: #000000;
        --bg-card: #1C1C1E;
        --text-main: #FFFFFF;
        --text-sub: #EBEBF5;
        --border-light: #38383A;
        --input-bg: #2C2C2E;
        --card-shadow: 0 4px 12px rgba(0,0,0,0.3);
        --primary-color: #0A84FF;
        --success-color: #30D158;
        --warning-color: #FF9F0A;
        --danger-color: #FF453A;
        --nav-bg: rgba(28, 28, 30, 0.9);
        --header-bg: #1C1C1E;
      }
    }

    * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
    body { 
      margin: 0; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif; 
      background: var(--bg-body); color: var(--text-main);
      padding-bottom: 80px; overflow-x: hidden; transition: 0.3s;
    }

    .container { max-width: 900px; margin: 0 auto; padding: 0 15px; }
    
    /* HEADER */
    .dash-header { padding: 15px; display: flex; justify-content: space-between; align-items: center; background: var(--header-bg); box-shadow: 0 1px 5px rgba(0,0,0,0.05); position: sticky; top:0; z-index: 50;}
    .dash-header h2 { color: var(--primary-color); margin: 0; font-size: 18px; font-weight: 800; letter-spacing: 0.5px; text-transform: uppercase;}
    .sys-btn { background: var(--warning-color); color: white; border: none; border-radius: 8px; padding: 8px 12px; font-weight: bold; cursor: pointer; font-size: 14px;}

    .card { background: var(--bg-card); border-radius: 14px; padding: 14px; box-shadow: var(--card-shadow); margin-top: 15px; border: 1px solid var(--border-light); }
    .btn { margin: 5px 0 10px 0; width: 100%; padding: 14px; font-size: 15px; font-weight: bold; border: none; border-radius: 10px; background: var(--success-color); color: #fff; cursor: pointer; transition: 0.2s; display:flex; justify-content:center; align-items:center; gap:8px;}
    .btn:active { transform: scale(0.98); opacity: 0.8;}

    /* FORM COMPONENTS */
    .form-group { margin-bottom: 12px; display: flex; flex-direction: column; }
    .form-group label { display: block; font-size: 13px; font-weight: bold; color: var(--text-sub); margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    
    .form-control { 
        width: 100%; height: 46px; padding: 0 12px; font-size: 15px; 
        border-radius: 8px; border: 1px solid var(--border-light); 
        background: var(--input-bg); color: var(--text-main); 
        -webkit-appearance: none; appearance: none; font-family: inherit;
    }
    .form-control:focus { outline: none; border-color: var(--primary-color); }
    
    select.form-control {
        background-image: url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%238E8E93' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M6 9l6 6 6-6'/%3E%3C/svg%3E");
        background-repeat: no-repeat; background-position: right 12px center; background-size: 16px; padding-right: 36px;
    }

    input[type="date"].form-control { text-align: center; }

    .form-row { display: flex; gap: 8px; width: 100%; align-items: flex-end; }
    .form-row .form-group { flex: 1 1 0%; min-width: 0; margin-bottom: 12px; }

    .btn-sm { padding: 6px 8px; font-size: 13px; border-radius: 6px; font-weight: bold; border: none; cursor: pointer; color: white; margin: 2px; }
    .btn-del { background: var(--danger-color); }
    .btn-edit { background: var(--primary-color); }
    
    /* DANH MỤC EXCEL */
    .search-bar-container { display: flex; gap: 8px; margin-bottom: 10px; }
    .search-input { flex: 1; padding: 0 12px !important; height: 46px; font-size: 15px !important; border-radius: 8px !important; border: 1px solid var(--border-light) !important; background: var(--input-bg) !important; color: var(--text-main) !important;}
    .action-btn { display: flex; align-items: center; justify-content: center; width: 46px; height: 46px; color: white; border-radius: 8px; font-size: 20px; border: none; cursor: pointer; flex-shrink:0;}
    .setting-panel { background: var(--input-bg); border: 2px solid var(--warning-color); border-radius: 10px; padding: 15px; margin-bottom: 15px; display: none; }
    .set-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; font-size: 14px; font-weight: bold; padding-bottom: 8px; border-bottom: 1px solid var(--border-light);}
    .set-row:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0;}
    
    /* BẢNG CHUNG */
    .table-container { overflow-x: auto; max-height: 60vh; overflow-y: auto; border-radius: 10px; border: 1px solid var(--border-light); -webkit-overflow-scrolling: touch; }
    table { table-layout: auto; width: 100%; border-collapse: collapse; min-width: 500px; }
    th { background: var(--primary-color); color: #fff; position: sticky; top: 0; z-index: 10; font-weight: bold; font-size: 13px; padding: 10px 6px; border-right: 1px solid rgba(255, 255, 255, 0.2); white-space: nowrap; text-align: center;}
    td { padding: 10px 6px; border-bottom: 1px solid var(--border-light); border-right: 1px solid var(--border-light); word-wrap: break-word; white-space: normal; text-align: center; font-size: 13px; }
    
    #bang-danh-muc th:first-child { position: sticky; left: 0; z-index: 12; }
    #bang-danh-muc td:first-child { position: sticky; left: 0; z-index: 11; background: var(--bg-card); font-weight: bold; }

    /* BOTTOM NAVIGATION */
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--nav-bg); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); display: flex; justify-content: space-around; padding: 8px 0 15px 0; border-top: 1px solid var(--border-light); z-index: 9000; }
    .nav-item { flex: 1; text-align: center; font-size: 11px; font-weight: bold; color: var(--text-sub); display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; }
    .nav-item.active { color: var(--primary-color); }
    .nav-icon { font-size: 20px; }

    .tab-content { display: none; animation: fadeIn 0.3s ease; }
    .tab-content.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

    /* MODALS */
    .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(3px); z-index: 10000; display: none; align-items: center; justify-content: center; opacity: 0; transition: 0.3s; }
    .modal-overlay.show { opacity: 1; }
    .custom-dialog-box { background: var(--bg-card); width: 90%; max-width: 350px; border-radius: 16px; padding: 20px; text-align: center; box-shadow: var(--card-shadow); transform: scale(0.9); opacity: 0; transition: 0.3s; border: 1px solid var(--border-light); display: flex; flex-direction: column; }
    .modal-overlay.show .custom-dialog-box { transform: scale(1); opacity: 1; }
    .dialog-buttons { display: flex; gap: 10px; margin-top: 20px;}
    .btn-dialog { flex: 1; padding: 12px; border-radius: 8px; font-weight: bold; border: none; cursor: pointer; background: var(--primary-color); color: white;}
    
    .modal-full { width: 95%; max-width: 600px; height: 85vh; padding: 15px; display: flex; flex-direction: column; justify-content: flex-start; }
    .modal-full h3 { margin: 0 0 15px 0; flex-shrink: 0; }
    #search-modal-dan { flex-shrink: 0; margin-bottom: 10px; } 
    .modal-list-container { flex: 1; overflow-y: auto; text-align: left; border: 1px solid var(--border-light); border-radius: 8px; min-height: 0; }
    .modal-list-item { padding: 12px; border-bottom: 1px solid var(--border-light); font-size: 14px; display: flex; justify-content: space-between; align-items: center; }
    .modal-list-item:active { background: var(--input-bg); }
    .text-dan-name { font-weight:bold; color:var(--primary-color); white-space: normal; word-break: break-word; line-height: 1.3; margin-bottom: 4px;}
    
    .btn-modal-cancel { flex: 0 0 auto; height: 48px; width: 100%; margin-top: 15px; background: var(--text-sub); color: white; border-radius: 8px; font-weight: bold; border: none; cursor: pointer; }

    /* BÁO CÁO TAB */
    .tong-hop-box { background: var(--input-bg); border: 1px solid var(--border-light); padding: 15px; border-radius: 10px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center;}
    .tong-hop-so { font-size: 24px; font-weight: bold; color: var(--primary-color); }
    
    .input-clickable { cursor: pointer; background-color: #E3F2FD; color: var(--primary-color); font-weight: bold; }
  </style>
</head>
<body>

  <!-- HEADER -->
  <div class="dash-header">
    <h2 id="app-title">DANH MỤC ĐẠN</h2>
    <button class="sys-btn" onclick="moMenuHeThong()">⚙️ Hệ Thống</button>
  </div>

  <div class="container">
    <!-- ==================== TAB 1: DANH MỤC ==================== -->
    <div id="tab-danh-muc" class="tab-content active">
      <div class="card" style="margin-top: 5px;">
        <div class="search-bar-container">
          <input type="text" id="search-danh-muc" class="search-input" placeholder="Tìm kiếm danh mục..." onkeyup="debounceTimKiem()">
          <button class="action-btn" style="background:var(--warning-color)" onclick="toggleCaiDatDanhMuc(); haptic();">⚙️</button>
          <button class="action-btn" style="background:var(--success-color)" onclick="document.getElementById('excel-upload').click(); haptic();">📂</button>
          <input type="file" id="excel-upload" style="display:none;" accept=".xlsx, .xls, .csv" onchange="xuLyFileExcel(event)">
        </div>
        <div style="font-size: 12px; color: var(--text-sub); text-align: center;">Vuốt ngang bảng để xem các cột bị che khuất</div>
      </div>

      <div class="card" style="padding: 0; overflow: hidden; border: none;">
        <div class="table-container">
          <table id="bang-danh-muc">
            <thead><tr id="dm-header"><th>DỮ LIỆU DANH MỤC</th></tr></thead>
            <tbody id="dm-body"><tr><td style="color:var(--text-sub); padding: 30px;">Chưa có dữ liệu.<br>Bấm <b>📂</b> để tải file Excel.</td></tr></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- ==================== TAB 2: LỆNH XUẤT ==================== -->
    <div id="tab-lenh" class="tab-content">
      <div class="card" style="margin-top: 5px;">
        <button class="btn" style="background: var(--info-color); margin-bottom: 15px;" onclick="moModalXemLenh()">📊 XEM TỔNG KHỐI LƯỢNG LỆNH (TẤN)</button>
        <hr style="border: 0; border-top: 1px dashed var(--border-light); margin: 0 0 15px 0;">

        <div class="form-group" style="margin-bottom:15px;">
          <label>Số Lệnh / Phiếu xuất</label>
          <input type="text" id="lenh-so" class="form-control" placeholder="VD: Số 01/PX" style="border-color: var(--primary-color); font-weight:bold;">
        </div>

        <div class="form-group">
          <label>Tên đạn dược (Bấm vào để chọn)</label>
          <!-- Ô Nhập Gộp Nút Tìm Kiếm -->
          <input type="text" id="lenh-ten" class="form-control input-clickable" placeholder="🔍 Bấm vào đây để tìm và chọn đạn..." readonly onclick="moModalChonDan()">
        </div>
        
        <div class="form-row" style="margin-bottom:0; flex-wrap: nowrap;">
          <div class="form-group" style="flex: 1 1 30%;">
            <label>ĐVT</label>
            <input type="text" id="lenh-dvt" class="form-control" readonly style="padding:0 5px; text-align:center;">
          </div>
          <div class="form-group" style="flex: 1 1 30%;">
            <label>Cấp</label>
            <select id="lenh-cap" class="form-control" style="padding:0 5px; text-align:center;">
              <option value=""></option>
              <option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option>
            </select>
          </div>
          <div class="form-group" style="flex: 1 1 40%;">
            <label>Số lượng</label>
            <input type="number" inputmode="decimal" id="lenh-sl" class="form-control" style="padding:0 5px; text-align:center;">
          </div>
        </div>
        
        <div style="display:flex; gap:10px; margin-top: 5px;">
            <button class="btn" id="btn-luu-lenh" onclick="xuLyLuuLenh()" style="margin-bottom:0; flex:1;">+ THÊM LỆNH</button>
            <button class="btn" id="btn-huy-lenh" onclick="huySuaLenh()" style="margin-bottom:0; background:var(--text-sub); display:none; flex:1;">HỦY SỬA</button>
        </div>
      </div>

      <div class="card" style="padding:0; overflow:hidden; border:none;">
        <div class="table-container">
          <table>
            <thead>
              <tr>
                <th style="width: 80px;">Lệnh</th>
                <th style="width: 150px;">Tên đạn</th>
                <th style="width: 50px;">ĐVT</th>
                <th style="width: 40px;">Cấp</th>
                <th style="width: 60px;">SL</th>
                <th style="width: 80px;">Hành động</th>
              </tr>
            </thead>
            <tbody id="tbody-lenh"></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- ==================== TAB 3: THỰC HIỆN ==================== -->
    <div id="tab-thuc-hien" class="tab-content">
      <div class="card" style="margin-top: 5px;">
        
        <div class="form-row" style="flex-wrap: nowrap;">
            <div class="form-group" style="flex:1.2;">
                <label>Xe nhận</label>
                <input type="text" id="th-xe" class="form-control" placeholder="Trống = tự tăng">
            </div>
            <div class="form-group">
                <label>Ngày xuất</label>
                <input type="date" id="th-ngay" class="form-control" style="font-weight:bold; padding: 0 5px;">
            </div>
        </div>
        
        <div class="form-group">
          <label>Bước 1: Chọn Lệnh Xuất</label>
          <select id="th-so-lenh" class="form-control" onchange="loadDanTheoLenh()"><option value="">-- Chọn lệnh --</option></select>
        </div>

        <div class="form-group">
          <label>Bước 2: Chọn Đạn trong Lệnh</label>
          <select id="th-chon-dan" class="form-control" onchange="tuDongDienCapTuLenh()"><option value="">-- Chọn đạn --</option></select>
        </div>
        
        <div class="form-row" style="margin-bottom:0; flex-wrap: nowrap;">
          <div class="form-group" style="flex: 1 1 40%;">
            <label>Cấp (Thực tế)</label>
            <select id="th-cap" class="form-control" style="text-align:center; padding:0 5px;">
              <option value=""></option>
              <option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option>
            </select>
          </div>
          <div class="form-group" style="flex: 1 1 60%;">
            <label>SL (Thực xuất)</label>
            <input type="number" inputmode="decimal" id="th-sl" class="form-control" placeholder="Số lượng" style="text-align:center;">
          </div>
        </div>
        
        <div style="display:flex; gap:10px; margin-top: 5px;">
            <button class="btn" id="btn-ghi-xe" onclick="xuLyGhiXe()" style="margin-bottom:0; background:var(--warning-color); flex:1;">+ GHI SỔ XE</button>
            <button class="btn" id="btn-huy-xe" onclick="huySuaThucHien()" style="margin-bottom:0; background:var(--text-sub); display:none; flex:1;">HỦY SỬA</button>
        </div>
      </div>

      <div class="card" style="padding:0; overflow:hidden; border:none;">
        <div class="table-container">
          <table>
            <thead>
              <tr>
                <th style="width: 70px;">Ngày</th>
                <th style="width: 60px;">Xe</th>
                <th style="width: 130px;">Tên đạn</th>
                <th style="width: 40px;">Cấp</th>
                <th style="width: 50px;">SL</th>
                <th style="width: 80px;">Hành động</th>
              </tr>
            </thead>
            <tbody id="tbody-thuc-hien"></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- ==================== TAB 4: BÁO CÁO ==================== -->
    <div id="tab-bao-cao" class="tab-content">
      
      <div class="card" style="margin-top: 5px; background:var(--primary-color); color:white; border:none;">
          <h3 style="margin: 0 0 10px 0;">LỌC BÁO CÁO</h3>
          <div class="form-row" style="margin-bottom:0;">
              <div class="form-group">
                  <label style="color:rgba(255,255,255,0.8)">Ngày xuất (Trong kỳ)</label>
                  <input type="date" id="bc-ngay" class="form-control" onchange="renderBaoCao()" style="padding:0 5px;">
              </div>
              <div class="form-group">
                  <label style="color:rgba(255,255,255,0.8)">Lọc Số Xe</label>
                  <input type="text" id="bc-xe" class="form-control" placeholder="Tất cả xe..." onkeyup="renderBaoCao()">
              </div>
          </div>
      </div>

      <div style="display:flex; gap:10px;">
          <button class="btn" style="background:#0A84FF; margin:10px 0; width:100%;" onclick="xuatAnhBaoCao()">📸 XUẤT ẢNH BÁO CÁO</button>
      </div>

      <div class="tong-hop-box">
          <div>
              <div style="font-weight:bold; color:var(--text-main); font-size:16px;">TỔNG LƯỢT XUẤT</div>
              <div style="font-size:12px; color:var(--text-sub);">Dựa trên bộ lọc</div>
          </div>
          <div class="tong-hop-so" id="bc-tong-luot">0</div>
      </div>

      <!-- KHU VỰC NÀY SẼ ĐƯỢC CHỤP ẢNH -->
      <div id="khu-vuc-chup-anh" style="background: var(--bg-card); border-radius: 12px; padding: 15px 10px; border: 1px solid var(--border-light);">
          <div style="text-align:center; font-size:18px; font-weight:bold; color:var(--primary-color); margin-bottom:10px; text-transform:uppercase;" id="bc-tieu-de-anh">BÁO CÁO XUẤT KHO</div>
          
          <div class="card" style="padding:0; overflow:hidden; border:none; box-shadow:none; margin-top:0; border-radius: 0;">
            <div class="table-container" id="table-bao-cao-scroll" style="max-height: 55vh; border-radius: 0;">
              <table style="min-width: 600px;">
                <thead>
                  <tr>
                      <th style="width: 40px;">Xe</th>
