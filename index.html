<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Quản Lý Đạn" />
  <meta name="mobile-web-app-capable" content="yes" />

  <title>Quản lý Xuất Đạn Dược</title>

  <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <style>
    /* ================== BIẾN MÀU SẮC TỰ ĐỘNG ================== */
    :root {
      --bg-body: #F2F2F7;
      --bg-card: #FFFFFF;
      --text-main: #1C1C1E;
      --text-sub: #8E8E93;
      --border-light: #E5E5EA;
      --input-bg: #F9F9F9;
      --card-shadow: 0 4px 12px rgba(0,0,0,0.06);
      --primary-color: #007AFF;
      --success-color: #34C759;
      --warning-color: #FF9500;
      --danger-color: #FF3B30;
      --nav-bg: rgba(255, 255, 255, 0.9);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-body: #000000;
        --bg-card: #1C1C1E;
        --text-main: #FFFFFF;
        --text-sub: #EBEBF5;
        --border-light: #38383A;
        --input-bg: #2C2C2E;
        --card-shadow: 0 4px 12px rgba(0,0,0,0.3);
        --primary-color: #0A84FF;
        --success-color: #30D158;
        --warning-color: #FF9F0A;
        --danger-color: #FF453A;
        --nav-bg: rgba(28, 28, 30, 0.9);
      }
    }

    * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
    body { 
      margin: 0; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif; 
      background: var(--bg-body); color: var(--text-main);
      padding-bottom: 80px; /* Nhường chỗ cho Bottom Nav */
      overflow-x: hidden; transition: background 0.3s, color 0.3s;
    }

    .container { max-width: 900px; margin: 0 auto; padding: 0 15px; }
    
    .dash-header { padding: 15px 15px 10px 15px; text-align: center; }
    .dash-header h2 { color: var(--primary-color); margin: 0; font-size: 22px; font-weight: 800; letter-spacing: 1px; }

    .card { background: var(--bg-card); border-radius: 18px; padding: 14px; box-shadow: var(--card-shadow); margin-bottom: 15px; border: 1px solid var(--border-light); }
    .btn { margin: 5px 0 15px 0; width: 100%; padding: 14px; font-size: 16px; font-weight: bold; border: none; border-radius: 12px; background: var(--success-color); color: #fff; cursor: pointer; transition: 0.2s; }
    .btn:active { transform: scale(0.98); opacity: 0.8;}

    /* FORM & INPUTS */
    .form-group { margin-bottom: 12px; }
    .form-group label { display: block; font-size: 13px; font-weight: bold; color: var(--text-sub); margin-bottom: 5px; }
    .form-control { width: 100%; padding: 12px; font-size: 16px; border-radius: 10px; border: 1px solid var(--border-light); background: var(--input-bg); color: var(--text-main); }
    .form-control:focus { outline: none; border-color: var(--primary-color); }
    .form-row { display: flex; gap: 10px; }
    .form-row .form-group { flex: 1; }

    /* NÚT ACTION NHỎ */
    .btn-sm { padding: 8px 12px; font-size: 13px; border-radius: 6px; font-weight: bold; border: none; cursor: pointer; color: white; }
    .btn-del { background: var(--danger-color); }
    
    /* DANH MỤC EXCEL COMPONENT */
    .search-bar-container { display: flex; gap: 8px; margin-bottom: 10px; }
    .search-input { flex: 1; padding: 12px 15px !important; font-size: 16px !important; border-radius: 12px !important; border: 1px solid var(--border-light) !important; background: var(--input-bg) !important; color: var(--text-main) !important;}
    .search-input:focus { outline: none; border: 2px solid var(--primary-color) !important; }
    .action-btn { display: flex; align-items: center; justify-content: center; width: 48px; height: 48px; color: white; border-radius: 50%; font-size: 22px; border: none; cursor: pointer; transition: 0.2s; flex-shrink:0;}
    .action-btn:active { transform: scale(0.9); }
    
    .setting-panel { background: var(--input-bg); border: 2px solid var(--warning-color); border-radius: 12px; padding: 15px; margin-bottom: 15px; display: none; }
    .set-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; font-size: 14px; font-weight: bold; }
    
    /* BẢNG CHUNG */
    .table-container { overflow-x: auto; max-height: 60vh; overflow-y: auto; border-radius: 12px; border: 1px solid var(--border-light); }
    table { table-layout: fixed; width: 100%; border-collapse: collapse; min-width: 500px; }
    th { background: var(--primary-color); color: #fff; position: sticky; top: 0; z-index: 10; font-weight: 800; font-size: 14px; padding: 12px 5px; border-right: 1px solid rgba(255, 255, 255, 0.3); }
    th:last-child { border-right: none; }
    td { padding: 12px 5px; border-bottom: 1px solid var(--border-light); border-right: 1px solid var(--border-light); word-wrap: break-word; overflow-wrap: break-word; white-space: normal; text-align: center; }
    td:last-child { border-right: none; }
    
    /* Cố định cột đầu cho bảng Excel (Danh mục) */
    #bang-danh-muc th:first-child { position: sticky; left: 0; z-index: 12; }
    #bang-danh-muc td:first-child { position: sticky; left: 0; z-index: 11; background: var(--bg-card); font-weight: bold; }

    /* BOTTOM NAVIGATION BAR */
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--nav-bg); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); display: flex; justify-content: space-around; padding: 10px 0 20px 0; border-top: 1px solid var(--border-light); z-index: 9000; }
    .nav-item { flex: 1; text-align: center; font-size: 12px; font-weight: bold; color: var(--text-sub); display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; transition: 0.2s;}
    .nav-item.active { color: var(--primary-color); }
    .nav-icon { font-size: 22px; }

    /* TAB CONTENT */
    .tab-content { display: none; animation: fadeIn 0.3s ease; }
    .tab-content.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

    /* CUSTOM DIALOG & MODAL */
    .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(3px); z-index: 10000; display: none; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.3s ease; }
    .modal-overlay.show { opacity: 1; }
    .custom-dialog-box { background: var(--bg-card); width: 85%; max-width: 320px; border-radius: 20px; padding: 25px 20px 20px 20px; text-align: center; box-shadow: var(--card-shadow); transform: scale(0.9); opacity: 0; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); border: 1px solid var(--border-light); }
    .modal-overlay.show .custom-dialog-box { transform: scale(1); opacity: 1; }
    .dialog-title { font-size: 18px; font-weight: 800; margin: 0 0 10px 0; }
    .dialog-message { font-size: 15px; color: var(--text-sub); margin: 0 0 20px 0; line-height: 1.4; }
    .dialog-buttons { display: flex; gap: 10px; margin-top: 20px;}
    .btn-dialog { flex: 1; padding: 12px; border-radius: 10px; font-weight: bold; border: none; font-size: 15px; cursor: pointer; background: var(--primary-color); color: white;}
    
    /* MODAL CHỌN ĐẠN TỪ DANH MỤC */
    .modal-full { width: 95%; max-width: 600px; max-height: 85vh; padding: 15px; display: flex; flex-direction: column; }
    .modal-list-container { flex: 1; overflow-y: auto; text-align: left; margin-top: 10px; border: 1px solid var(--border-light); border-radius: 10px; }
    .modal-list-item { padding: 12px; border-bottom: 1px solid var(--border-light); font-size: 14px; display: flex; justify-content: space-between; align-items: center; }
    .modal-list-item:active { background: var(--input-bg); }
  </style>
</head>
<body>

  <div class="dash-header">
    <h2 id="app-title">DANH MỤC ĐẠN</h2>
  </div>

  <div class="container">
    
    <!-- ==================== TAB 1: DANH MỤC (GỐC) ==================== -->
    <div id="tab-danh-muc" class="tab-content active">
      <div class="search-bar-container">
        <input type="text" id="search-danh-muc" class="search-input" placeholder="Tìm kiếm danh mục..." onkeyup="debounceTimKiem()">
        <button class="action-btn" style="background:var(--warning-color)" onclick="toggleCaiDatDanhMuc(); haptic();">⚙️</button>
        <button class="action-btn" style="background:var(--success-color)" onclick="document.getElementById('excel-upload').click(); haptic();">+</button>
        <input type="file" id="excel-upload" style="display:none;" accept=".xlsx, .xls, .csv" onchange="xuLyFileExcel(event)">
      </div>

      <div id="panel-cai-dat-danh-muc" class="setting-panel">
        <div style="text-align: center; color: var(--warning-color); font-weight: 800; margin-bottom: 10px;">CÀI ĐẶT BẢNG</div>
        <div class="set-row">
          <span>Cỡ chữ (px):</span>
          <input type="number" id="set-fontsize" step="0.25" placeholder="VD: 14" style="width: 100px !important; padding: 8px !important; font-size: 16px !important; border-radius:6px; background:var(--input-bg); border: 1px solid var(--border-light); color:var(--text-main);" value="14">
        </div>
        <div id="danh-sach-cot-cai-dat"></div>
        <button onclick="luuCaiDatDanhMuc()" class="btn" style="background:var(--warning-color); padding:12px; margin-bottom:0; margin-top:10px;">LƯU VÀ ÁP DỤNG</button>
      </div>

      <div class="card" style="padding: 0; overflow: hidden; border-radius: 12px; border: none;">
        <div class="table-container">
          <table id="bang-danh-muc">
            <thead><tr id="dm-header"><th>DỮ LIỆU DANH MỤC</th></tr></thead>
            <tbody id="dm-body"><tr><td style="color:var(--text-sub); padding: 30px;">Chưa có dữ liệu.<br><br>Bấm nút <b>+</b> để tải file Excel.</td></tr></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- ==================== TAB 2: LỆNH XUẤT ==================== -->
    <div id="tab-lenh" class="tab-content">
      <div class="card">
        <button class="btn" style="background: var(--primary-color); margin-bottom: 15px;" onclick="moModalChonDan()"><span style="font-size:18px">🔍</span> Chọn đạn từ Danh mục</button>
        
        <div class="form-group">
          <label>Tên đạn dược</label>
          <input type="text" id="lenh-ten" class="form-control" placeholder="Tự động điền..." readonly>
        </div>
        
        <div class="form-row">
          <div class="form-group" style="flex: 0.8">
            <label>ĐVT</label>
            <input type="text" id="lenh-dvt" class="form-control" placeholder="ĐVT" readonly>
          </div>
          <div class="form-group" style="flex: 0.8">
            <label>Cấp</label>
            <input type="number" id="lenh-cap" class="form-control" placeholder="Cấp">
          </div>
          <div class="form-group" style="flex: 1.4">
            <label>Số lượng (Phải xuất)</label>
            <input type="number" id="lenh-sl" class="form-control" placeholder="Số lượng">
          </div>
        </div>
        
        <button class="btn" onclick="themVaoLenh()" style="margin-bottom:0; margin-top: 5px;">+ THÊM VÀO LỆNH XUẤT</button>
      </div>

      <div class="card" style="padding:0; overflow:hidden; border:none;">
        <div class="table-container">
          <table>
            <thead>
              <tr>
                <th style="width: 40px;">STT</th>
                <th style="width: 150px;">Tên đạn dược</th>
                <th style="width: 50px;">ĐVT</th>
                <th style="width: 50px;">Cấp</th>
                <th style="width: 70px;">Số lượng</th>
                <th style="width: 60px;">Xóa</th>
              </tr>
            </thead>
            <tbody id="tbody-lenh">
              <!-- Render logic -->
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- ==================== TAB 3: THỰC HIỆN ==================== -->
    <div id="tab-thuc-hien" class="tab-content">
      <div class="card">
        <div class="form-group">
          <label>Xe thực hiện (Số xe / Tên xe)</label>
          <input type="text" id="th-xe" class="form-control" placeholder="VD: Xe 01 hoặc 29A-12345">
        </div>
        
        <div class="form-group">
          <label>Chọn loại đạn cần xuất (Từ Lệnh)</label>
          <select id="th-chon-lenh" class="form-control" onchange="tuDongDienCapTuLenh()">
            <option value="">-- Chưa có Lệnh xuất nào --</option>
          </select>
        </div>
        
        <div class="form-row">
          <div class="form-group">
            <label>Cấp (Thực tế)</label>
            <input type="number" id="th-cap" class="form-control" placeholder="Cấp">
          </div>
          <div class="form-group">
            <label>Số lượng (Thực xuất)</label>
            <input type="number" id="th-sl" class="form-control" placeholder="Số lượng">
          </div>
        </div>
        
        <button class="btn" onclick="themVaoThucHien()" style="margin-bottom:0; margin-top: 5px; background:var(--warning-color)">+ GHI SỔ XE</button>
      </div>

      <div class="card" style="padding:0; overflow:hidden; border:none;">
        <div class="table-container">
          <table>
            <thead>
              <tr>
                <th style="width: 80px;">Xe</th>
                <th style="width: 150px;">Tên đạn dược</th>
                <th style="width: 50px;">ĐVT</th>
                <th style="width: 50px;">Cấp</th>
                <th style="width: 70px;">SL Giao</th>
                <th style="width: 60px;">Xóa</th>
              </tr>
            </thead>
            <tbody id="tbody-thuc-hien">
              <!-- Render logic -->
            </tbody>
          </table>
        </div>
      </div>
    </div>

  </div> <!-- End Container -->

  <!-- ==================== BOTTOM NAVIGATION ==================== -->
  <div class="bottom-nav">
    <div class="nav-item active" id="nav-danh-muc" onclick="chuyenTab('tab-danh-muc', 'DANH MỤC ĐẠN', 'nav-danh-muc')">
      <div class="nav-icon">📋</div>
      <div>Danh Mục</div>
    </div>
    <div class="nav-item" id="nav-lenh" onclick="chuyenTab('tab-lenh', 'LỆNH PHẢI XUẤT', 'nav-lenh')">
      <div class="nav-icon">📝</div>
      <div>Lệnh Xuất</div>
    </div>
    <div class="nav-item" id="nav-thuc-hien" onclick="chuyenTab('tab-thuc-hien', 'THỰC XUẤT CHO XE', 'nav-thuc-hien')">
      <div class="nav-icon">🚚</div>
      <div>Thực Hiện</div>
    </div>
  </div>

  <!-- Custom Dialog Box Chung -->
  <div id="custom-dialog-wrapper" class="modal-overlay">
    <div class="custom-dialog-box">
      <h3 id="dialog-title" class="dialog-title">Thông báo</h3>
      <p id="dialog-message" class="dialog-message">Nội dung</p>
      <div id="dialog-buttons" class="dialog-buttons"></div>
    </div>
  </div>

  <!-- Modal Bảng chọn đạn -->
  <div id="modal-chon-dan" class="modal-overlay">
    <div class="custom-dialog-box modal-full">
      <h3 class="dialog-title">Tìm và Chọn Đạn</h3>
      <input type="text" id="search-modal-dan" class="form-control" placeholder="Tìm tên đạn..." onkeyup="timKiemModalDan()">
      <div class="modal-list-container" id="modal-danh-sach-dan">
        <!-- Render list -->
      </div>
      <button class="btn-dialog" style="margin-top:15px; background:var(--text-sub)" onclick="dongModalChonDan()">HỦY BỎ</button>
    </div>
  </div>

<script>
  function haptic() { if (navigator.vibrate) navigator.vibrate(15); }

  // 1. STATE MANAGEMENT NÂNG CẤP
  const STATE = {
    excel: { data: [], config: { fontSize: 14, cot: {} } },
    lenh: [],       // Mảng chứa: { id, ten, dvt, cap, sl }
    thucHien: []    // Mảng chứa: { id, lenhId, xe, ten, dvt, cap, sl }
  };

  // 2. TIỆN ÍCH AN TOÀN
  function escapeHTML(str) {
      if (str === null || str === undefined) return '';
      return String(str).replace(/[&<>'"]/g, tag => ({
          '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
      }[tag] || tag));
  }

  function generateID() {
      return Date.now().toString(36) + Math.random().toString(36).substr(2);
  }

  // Khởi tạo
  document.addEventListener('DOMContentLoaded', () => { 
      try {
          // Load Danh mục
          let savedDanhMuc = localStorage.getItem('duLieuExcelOffline'); 
          if (savedDanhMuc) { 
              STATE.excel.data = JSON.parse(savedDanhMuc); 
              let savedConfig = localStorage.getItem('cauHinhBangExcel'); 
              if (savedConfig) STATE.excel.config = JSON.parse(savedConfig); 
              else taoCauHinhMacDinh(); 
              hienThiBangDanhMuc(STATE.excel.data); 
          }

          // Load Lệnh
          let savedLenh = localStorage.getItem('duLieuLenh');
          if (savedLenh) STATE.lenh = JSON.parse(savedLenh);

          // Load Thực hiện
          let savedThucHien = localStorage.getItem('duLieuThucHien');
          if (savedThucHien) STATE.thucHien = JSON.parse(savedThucHien);

          renderBangLenh();
          renderBangThucHien();

      } catch (error) {
          console.error("Lỗi parse dữ liệu từ LocalStorage:", error);
          showDialog("Lỗi Dữ Liệu", "Khôi phục dữ liệu thất bại do lỗi cấu trúc.", "alert");
      }
  });

  // --- DIALOG CHUNG ---
  window.showDialog = function(title, message, type = 'alert', confirmFn = null) {
      haptic();
      document.getElementById('dialog-title').innerText = title; 
      document.getElementById('dialog-message').innerHTML = message; 
      let btnContainer = document.getElementById('dialog-buttons');
      btnContainer.innerHTML = '';
      
      let wrapper = document.getElementById('custom-dialog-wrapper'); 
      wrapper.style.display = 'flex'; 
      setTimeout(() => wrapper.classList.add('show'), 10);

      window.closeDialog = function() { 
          wrapper.classList.remove('show'); 
          setTimeout(() => wrapper.style.display = 'none', 300); 
      };

      if (type === 'alert') {
          btnContainer.innerHTML = `<button onclick="closeDialog()" class="btn-dialog">ĐÓNG</button>`;
      } else if (type === 'confirm') {
          window.execConfirm = function() { closeDialog(); if(confirmFn) confirmFn(); }
          btnContainer.innerHTML = `
            <button onclick="closeDialog()" class="btn-dialog" style="background:var(--text-sub)">HỦY</button>
            <button onclick="execConfirm()" class="btn-dialog" style="background:var(--danger-color)">XÓA</button>
          `;
      }
  }

  // --- LOGIC CHUYỂN TAB ---
  function chuyenTab(tabId, title, navId) {
      haptic();
      // Ẩn tất cả tab
      document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
      
      // Hiển thị tab được chọn
      document.getElementById(tabId).classList.add('active');
      document.getElementById(navId).classList.add('active');
      document.getElementById('app-title').innerText = title;

      // Logic cập nhật UI khi vào tab cụ thể
      if(tabId === 'tab-thuc-hien') {
          capNhatDropdownLenh();
      }
  }

  // =========================================================
  // LOGIC TAB 1: DANH MỤC EXCEL (Đã tối ưu & giữ nguyên)
  // =========================================================
  let timeoutTimKiem = null;
  function debounceTimKiem() {
      if (timeoutTimKiem) clearTimeout(timeoutTimKiem);
      timeoutTimKiem = setTimeout(() => timKiemDanhMuc(), 300); 
  }

  function xuLyFileExcel(e) { 
      haptic(); 
      let file = e.target.files[0]; 
      if (!file) return; 
      let reader = new FileReader(); 
      reader.onload = function(evt) { 
          let data = new Uint8Array(evt.target.result); 
          let workbook = XLSX.read(data, {type: 'array'}); 
          let json = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], {defval: ""}); 
          
          if(json.length === 0) { 
              showDialog("Lỗi", "File rỗng hoặc định dạng sai!", "alert"); 
              e.target.value = ''; return; 
          } 
          
          let cleanedJson = json.map(row => { 
              let newRow = {}; 
              for (let key in row) { if (!key.startsWith('__EMPTY')) { newRow[key] = row[key]; } } 
              return newRow; 
          }); 
          STATE.excel.data = cleanedJson; 
          
          try { localStorage.setItem('duLieuExcelOffline', JSON.stringify(STATE.excel.data)); } 
          catch (e) { showDialog("Cảnh báo", "File quá lớn, chỉ xem tạm thời.", "alert"); }

          taoCauHinhMacDinh(); 
          hienThiBangDanhMuc(STATE.excel.data); 
          showDialog("Thành công", "Tải danh mục xong! Bạn có thể sang tab Lệnh Xuất.", "alert"); 
          e.target.value = ''; 
      }; 
      reader.readAsArrayBuffer(file); 
  }

  function taoCauHinhMacDinh() { 
      if (STATE.excel.data.length === 0) return;
      let cacCot = Object.keys(STATE.excel.data[0]).filter(c => !c.startsWith('__EMPTY')); 
      let defaultWidth = Math.floor(100 / cacCot.length); 
      STATE.excel.config.cot = {}; 
      cacCot.forEach(c => { STATE.excel.config.cot[c] = { show: true, width: defaultWidth }; }); 
      if(cacCot[0]) STATE.excel.config.cot[cacCot[0]].width = 50; 
      try { localStorage.setItem('cauHinhBangExcel', JSON.stringify(STATE.excel.config)); } catch(e) {}
  }

  function toggleCaiDatDanhMuc() { 
      haptic(); 
      let panel = document.getElementById('panel-cai-dat-danh-muc'); 
      if(panel.style.display === 'block') { panel.style.display = 'none'; return; } 
      if(STATE.excel.data.length === 0) { showDialog("Lỗi", "Vui lòng tải file Excel lên trước!", "alert"); return; } 
      document.getElementById('set-fontsize').value = STATE.excel.config.fontSize; 
      let htmlCaiDatCot = Object.keys(STATE.excel.config.cot).map(tenCot => { 
          if (tenCot.startsWith('__EMPTY')) return ''; 
          let isChecked = STATE.excel.config.cot[tenCot].show ? "checked" : ""; 
          let widthVal = STATE.excel.config.cot[tenCot].width; 
          return `<div class="set-row"><label style="margin:0; display:flex; align-items:center; flex:1; cursor:pointer;"><input type="checkbox" id="chk-${tenCot}" style="transform:scale(1.3); margin-right:10px;" onchange="chuyenPhanTramTuDong('${tenCot}')" ${isChecked}> ${tenCot}</label><div style="display:flex; align-items:center;"><input type="number" id="width-${tenCot}" value="${widthVal}" style="width:60px; padding:4px; margin-bottom:0;" ${!STATE.excel.config.cot[tenCot].show ? 'disabled style="background:var(--bg-body);"' : ''}> <span style="margin-left:5px;">%</span></div></div>`; 
      }).join(''); 
      document.getElementById('danh-sach-cot-cai-dat').innerHTML = htmlCaiDatCot; 
      panel.style.display = 'block'; 
  }

  function chuyenPhanTramTuDong(cotNay) { 
       // Giữ nguyên logic tính % cột
      let chk = document.getElementById('chk-' + cotNay); 
      let inp = document.getElementById('width-' + cotNay); 
      let soPhanTramHienTai = parseInt(inp.value) || 0; 
      let tatCaCacCot = Object.keys(STATE.excel.config.cot).filter(c => !c.startsWith('__EMPTY')); 
      let viTriHienTai = tatCaCacCot.indexOf(cotNay); 
      if (!chk.checked) { 
          inp.value = 0; inp.disabled = true; inp.style.background = "var(--bg-body)"; 
          let daTimThayCotNhan = false; 
          for (let i = viTriHienTai + 1; i < tatCaCacCot.length; i++) { 
              let chkTiepTheo = document.getElementById('chk-' + tatCaCacCot[i]); 
              if (chkTiepTheo && chkTiepTheo.checked) { 
                  let inpTiepTheo = document.getElementById('width-' + tatCaCacCot[i]); 
                  inpTiepTheo.value = (parseInt(inpTiepTheo.value) || 0) + soPhanTramHienTai; 
                  daTimThayCotNhan = true; break; 
              } 
          } 
          if (!daTimThayCotNhan) { 
              for (let i = viTriHienTai - 1; i >= 0; i--) { 
                  let chkPhiaTruoc = document.getElementById('chk-' + tatCaCacCot[i]); 
                  if (chkPhiaTruoc && chkPhiaTruoc.checked) { 
                      let inpPhiaTruoc = document.getElementById('width-' + tatCaCacCot[i]); 
                      inpPhiaTruoc.value = (parseInt(inpPhiaTruoc.value) || 0) + soPhanTramHienTai; break; 
                  } 
              } 
          } 
      } else { inp.disabled = false; inp.style.background = "var(--input-bg)"; } 
  }

  function luuCaiDatDanhMuc() { 
      haptic(); 
      let rawFontSize = document.getElementById('set-fontsize').value;
      STATE.excel.config.fontSize = parseFloat(rawFontSize.toString().replace(',', '.')) || 14; 
      Object.keys(STATE.excel.config.cot).forEach(tenCot => { 
          if(tenCot.startsWith('__EMPTY')) return; 
          let el = document.getElementById(`chk-${tenCot}`); 
          if(el) { 
              STATE.excel.config.cot[tenCot].show = el.checked; 
              let widthInput = parseInt(document.getElementById(`width-${tenCot}`).value); 
              STATE.excel.config.cot[tenCot].width = isNaN(widthInput) ? 0 : widthInput; 
          } 
      }); 
      try { localStorage.setItem('cauHinhBangExcel', JSON.stringify(STATE.excel.config)); } catch(e) {}
      document.getElementById('panel-cai-dat-danh-muc').style.display = 'none'; 
      timKiemDanhMuc(); 
  }

  function hienThiBangDanhMuc(data) { 
      let thead = document.getElementById('dm-header'); 
      let tbody = document.getElementById('dm-body'); 
      if (!data || data.length === 0) { 
          thead.innerHTML = "<th>DỮ LIỆU</th>"; 
          tbody.innerHTML = "<tr><td style='color:var(--text-sub); padding: 30px;'>Không tìm thấy kết quả.</td></tr>"; 
          return; 
      } 
      let cotHienThi = Object.keys(STATE.excel.config.cot).filter(c => STATE.excel.config.cot[c].show && !c.startsWith('__EMPTY')); 
      thead.innerHTML = cotHienThi.map(cot => `<th style="width: ${STATE.excel.config.cot[cot].width}%;">${cot}</th>`).join(''); 
      let fontSize = STATE.excel.config.fontSize + "px"; 
      let htmlNoiDung = data.map(hang => { 
          let cacOCuaHang = cotHienThi.map(cot => { 
              let align = cotHienThi.indexOf(cot) === 0 ? "left" : "center"; 
              return `<td style="text-align: ${align}; font-size: ${fontSize};">${escapeHTML(hang[cot] !== undefined ? hang[cot] : '')}</td>`; 
          }).join(''); 
          return `<tr>${cacOCuaHang}</tr>`; 
      }).join(''); 
      tbody.innerHTML = htmlNoiDung; 
  }

  function timKiemDanhMuc() { 
      let tuKhoa = document.getElementById('search-danh-muc').value.toLowerCase(); 
      if (!tuKhoa) { hienThiBangDanhMuc(STATE.excel.data); return; } 
      let ketQua = STATE.excel.data.filter(hang => { 
          return Object.values(hang).some(giaTri => String(giaTri).toLowerCase().includes(tuKhoa)); 
      }); 
      hienThiBangDanhMuc(ketQua); 
  }

  // =========================================================
  // LOGIC TAB 2: LỆNH XUẤT (Kèm Auto-Map)
  // =========================================================

  // Hàm nội bộ: Bóc tách thông minh Tên và ĐVT từ 1 dòng của Excel
  function trichXuatThongTinDan(hang) {
      let keys = Object.keys(hang);
      let tenCol = keys[0]; 
      let dvtCol = keys.length > 1 ? keys[1] : keys[0];

      for(let key of keys) {
          let lk = key.toLowerCase();
          if(lk.includes('tên') || lk.includes('đạn') || lk.includes('loại')) tenCol = key;
          if(lk.includes('đvt') || lk.includes('đơn vị') || lk.includes('tính')) dvtCol = key;
      }
      return { 
          ten: hang[tenCol] !== undefined ? String(hang[tenCol]) : 'N/A', 
          dvt: hang[dvtCol] !== undefined ? String(hang[dvtCol]) : '' 
      };
  }

  function moModalChonDan() {
      haptic();
      if(STATE.excel.data.length === 0) {
          showDialog("Lỗi", "Vui lòng tải File Excel Danh Mục ở tab đầu tiên trước.", "alert");
          return;
      }
      document.getElementById('search-modal-dan').value = '';
      renderListModalDan(STATE.excel.data);
      let wrapper = document.getElementById('modal-chon-dan');
      wrapper.style.display = 'flex';
      setTimeout(() => wrapper.classList.add('show'), 10);
  }

  function dongModalChonDan() {
      let wrapper = document.getElementById('modal-chon-dan');
      wrapper.classList.remove('show');
      setTimeout(() => wrapper.style.display = 'none', 300);
  }

  function renderListModalDan(data) {
      let container = document.getElementById('modal-danh-sach-dan');
      if(data.length === 0) {
          container.innerHTML = '<div style="padding:20px; text-align:center; color:gray;">Không tìm thấy đạn.</div>';
          return;
      }
      // Chỉ hiển thị tối đa 100 kết quả để tránh lag modal trên mobile
      let hienThi = data.slice(0, 100); 
      let html = hienThi.map((hang, index) => {
          let info = trichXuatThongTinDan(hang);
          // Truyền object dạng chuỗi base64 hoặc encode để an toàn, ở đây ta dùng index của mảng gốc để tra cứu
          let realIndex = STATE.excel.data.indexOf(hang);
          return `
          <div class="modal-list-item" onclick="chonDanTuModal(${realIndex})">
              <div>
                  <div style="font-weight:bold; color:var(--primary-color)">${escapeHTML(info.ten)}</div>
                  <div style="font-size:12px; color:var(--text-sub)">ĐVT: ${escapeHTML(info.dvt)}</div>
              </div>
              <div style="font-size:20px;">+</div>
          </div>`;
      }).join('');
      container.innerHTML = html;
  }

  let timeoutModal = null;
  function timKiemModalDan() {
      if(timeoutModal) clearTimeout(timeoutModal);
      timeoutModal = setTimeout(() => {
          let tk = document.getElementById('search-modal-dan').value.toLowerCase();
          if(!tk) { renderListModalDan(STATE.excel.data); return; }
          let kq = STATE.excel.data.filter(h => {
              let info = trichXuatThongTinDan(h);
              return info.ten.toLowerCase().includes(tk);
          });
          renderListModalDan(kq);
      }, 300);
  }

  function chonDanTuModal(index) {
      haptic();
      let hang = STATE.excel.data[index];
      let info = trichXuatThongTinDan(hang);
      document.getElementById('lenh-ten').value = info.ten;
      document.getElementById('lenh-dvt').value = info.dvt;
      dongModalChonDan();
  }

  function themVaoLenh() {
      haptic();
      let ten = document.getElementById('lenh-ten').value.trim();
      let dvt = document.getElementById('lenh-dvt').value.trim();
      let cap = document.getElementById('lenh-cap').value.trim();
      let sl = document.getElementById('lenh-sl').value.trim();

      if(!ten) { showDialog("Lỗi", "Vui lòng chọn đạn từ danh mục trước.", "alert"); return; }
      if(!sl) { showDialog("Lỗi", "Vui lòng nhập số lượng.", "alert"); return; }

      let item = { id: generateID(), ten, dvt, cap, sl: parseFloat(sl) };
      STATE.lenh.push(item);
      localStorage.setItem('duLieuLenh', JSON.stringify(STATE.lenh));
      
      // Reset form (Giữ lại ĐVT và Tên nếu họ muốn nhập cấp khác, nhưng thường sẽ reset)
      document.getElementById('lenh-cap').value = '';
      document.getElementById('lenh-sl').value = '';

      renderBangLenh();
      capNhatDropdownLenh(); // Cập nhật sang tab 3
  }

  function xoaLenh(id) {
      showDialog("Xác nhận", "Bạn có chắc muốn xóa lệnh xuất này? Các xe đang thực hiện theo lệnh này sẽ không bị ảnh hưởng.", "confirm", () => {
          STATE.lenh = STATE.lenh.filter(i => i.id !== id);
          localStorage.setItem('duLieuLenh', JSON.stringify(STATE.lenh));
          renderBangLenh();
          capNhatDropdownLenh();
      });
  }

  function renderBangLenh() {
      let tbody = document.getElementById('tbody-lenh');
      if(STATE.lenh.length === 0) {
          tbody.innerHTML = `<tr><td colspan="6" style="padding:20px; color:var(--text-sub);">Chưa có lệnh xuất nào.</td></tr>`;
          return;
      }
      tbody.innerHTML = STATE.lenh.map((item, index) => `
          <tr>
              <td>${index + 1}</td>
              <td style="text-align:left; font-weight:bold;">${escapeHTML(item.ten)}</td>
              <td>${escapeHTML(item.dvt)}</td>
              <td>${escapeHTML(item.cap)}</td>
              <td style="color:var(--primary-color); font-weight:bold;">${item.sl}</td>
              <td><button class="btn-sm btn-del" onclick="xoaLenh('${item.id}')">XÓA</button></td>
          </tr>
      `).join('');
  }

  // =========================================================
  // LOGIC TAB 3: THỰC HIỆN XUẤT CHO XE
  // =========================================================

  function capNhatDropdownLenh() {
      let select = document.getElementById('th-chon-lenh');
      if(STATE.lenh.length === 0) {
          select.innerHTML = '<option value="">-- Chưa có Lệnh xuất nào --</option>';
          return;
      }
      let html = '<option value="">-- Chọn lệnh đạn --</option>';
      html += STATE.lenh.map(l => {
          let text = `${l.ten} (Lệnh: ${l.sl} ${l.dvt})`;
          return `<option value="${l.id}">${escapeHTML(text)}</option>`;
      }).join('');
      select.innerHTML = html;
  }

  function tuDongDienCapTuLenh() {
      let idLenh = document.getElementById('th-chon-lenh').value;
      if(!idLenh) return;
      let lenhGoc = STATE.lenh.find(l => l.id === idLenh);
      if(lenhGoc && lenhGoc.cap) {
          document.getElementById('th-cap').value = lenhGoc.cap; // Gợi ý cấp từ lệnh
      }
  }

  function themVaoThucHien() {
      haptic();
      let xe = document.getElementById('th-xe').value.trim();
      let idLenh = document.getElementById('th-chon-lenh').value;
      let cap = document.getElementById('th-cap').value.trim();
      let sl = document.getElementById('th-sl').value.trim();

      if(!xe) { showDialog("Lỗi", "Vui lòng nhập tên hoặc số xe.", "alert"); return; }
      if(!idLenh) { showDialog("Lỗi", "Vui lòng chọn đạn từ Lệnh xuất.", "alert"); return; }
      if(!sl) { showDialog("Lỗi", "Vui lòng nhập số lượng xuất cho xe.", "alert"); return; }

      let lenhGoc = STATE.lenh.find(l => l.id === idLenh);
      if(!lenhGoc) return; // Bảo vệ

      let item = { 
          id: generateID(), 
          lenhId: idLenh, 
          xe: xe, 
          ten: lenhGoc.ten, 
          dvt: lenhGoc.dvt, 
          cap: cap, 
          sl: parseFloat(sl) 
      };

      STATE.thucHien.push(item);
      localStorage.setItem('duLieuThucHien', JSON.stringify(STATE.thucHien));

      // Reset form một phần (thường xuất 1 xe nhiều đạn, nên giữ lại tên Xe)
      document.getElementById('th-chon-lenh').value = '';
      document.getElementById('th-cap').value = '';
      document.getElementById('th-sl').value = '';

      renderBangThucHien();
      showDialog("Ghi sổ", `Đã ghi xuất ${sl} ${lenhGoc.dvt} cho xe ${xe}`, "alert");
  }

  function xoaThucHien(id) {
      showDialog("Xác nhận", "Bạn có chắc muốn xóa lịch sử xuất của xe này?", "confirm", () => {
          STATE.thucHien = STATE.thucHien.filter(i => i.id !== id);
          localStorage.setItem('duLieuThucHien', JSON.stringify(STATE.thucHien));
          renderBangThucHien();
      });
  }

  function renderBangThucHien() {
      let tbody = document.getElementById('tbody-thuc-hien');
      if(STATE.thucHien.length === 0) {
          tbody.innerHTML = `<tr><td colspan="6" style="padding:20px; color:var(--text-sub);">Chưa có xe nào nhận đạn.</td></tr>`;
          return;
      }
      // Hiển thị mới nhất lên đầu
      let reversed = [...STATE.thucHien].reverse();
      tbody.innerHTML = reversed.map((item) => `
          <tr>
              <td style="font-weight:bold; color:var(--warning-color); text-align:left;">${escapeHTML(item.xe)}</td>
              <td style="text-align:left; font-size:13px;">${escapeHTML(item.ten)}</td>
              <td>${escapeHTML(item.dvt)}</td>
              <td>${escapeHTML(item.cap)}</td>
              <td style="color:var(--success-color); font-weight:bold;">${item.sl}</td>
              <td><button class="btn-sm btn-del" onclick="xoaThucHien('${item.id}')">XÓA</button></td>
          </tr>
      `).join('');
  }
</script>
</body>
</html>
